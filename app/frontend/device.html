<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Device Data Table</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      background-color: #cabebe;
      background-image: url('/static/OIP(10).jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .dashboard-container {
      background: rgba(173, 165, 178, 0.486);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(200, 191, 203, 0.852);
      width: 90%;
      max-width: 100%;
      padding-left: 5%;
      padding-right: 5%;
      padding-bottom: 30px;
      color: #080404;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .brand img {
      height: 100px;
      border-radius: 5px;
      box-shadow: 0 4px 12px rgba(185, 231, 232, 0.2);
    }

    .nav-menu {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .nav-menu a,
    .logout-btn {
      color: #030006;
      font-weight: 700;
      text-decoration: none;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background-color 0.3s ease, color 0.3s ease;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 12px #9974d8;
    }

    .nav-menu a:hover,
    .logout-btn:hover {
      background: linear-gradient(90deg, #a327ae, #36b1f4);
      color: #fff;
      box-shadow: 0 6px 20px rgba(144, 160, 150, 0.4);
      transform: translateY(-2px);
    }

    .content h2 {
      font-size: 1.7rem;
      font-weight: 500;
      color: #070107;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 3px;
      text-shadow: 0 2px 3px rgba(238, 231, 231, 0.4);
    }

    .form-note {
      font-size: 1.0rem;
      color: #030006;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .device-table-wrap {
      margin-top: 27px;
      background: rgba(216, 210, 216, 0.286);
      border-radius: 15px;
      padding: 12px;
      box-shadow: 0 6px 30px rgba(192, 194, 200, 0.08);
      overflow: hidden;
    }

    table.device-table {
      width: 99.5%;
      border-radius: 15px;
      border-collapse: collapse;
      font-family: "Roboto", Arial, sans-serif;
      min-width: 700px;
    }

    table.device-table thead th {
      position: sticky;
      top: 0;
      z-index: 4;
      padding: 15px 14px;
      text-align: center;
      font-weight: 700;
      font-size: 1rem;
      color: #080007;
      background: linear-gradient(90deg, #d69adc 0%, #dfe0e2 100%);
      box-shadow: 0 2px 0 rgba(187, 137, 212, 0.06);
      border-bottom: 0;
      letter-spacing: 0.2px;
    }

    table.device-table thead th:first-child { border-top-left-radius: 8px; }
    table.device-table thead th:last-child  { border-top-right-radius: 8px; }

    table.device-table tbody tr {
      transition: background 220ms ease, transform 180ms ease, box-shadow 180ms ease;
      transform-origin: left center;
      cursor: default;
    }

    table.device-table tbody tr:nth-child(odd)  { background: #c3bfc8f1; }
    table.device-table tbody tr:nth-child(even) { background: #96939af1; }

    table.device-table td {
      padding: 18px 15px;
      border-bottom: 1.9px solid #e6edf2;
      color: #000509;
      font-size: 1rem;
      vertical-align: middle;
    }

    table.device-table tbody tr:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(123, 146, 201, 0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,250,251,0.96));
    }

    table.device-table tbody tr:hover td {
      color: #0f1724;
    }

    .device-id-badge {
      display:inline-block;
      background: rgba(209, 37, 235, 0.08);
      color: #000207;
      padding: 6px 15px;
      border-radius: 999px;
      font-weight:700;
      font-size:1rem;
      box-shadow: inset 0 -2px 12px rgba(37,99,235,0.03);
    }

    .col-battery, .col-temp {
      font-weight:700;
      color:#a0abb2;
    }

    @media (max-width: 900px) {
      .device-table-wrap { padding: 9px; }
      table.device-table { min-width: 700px; }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">

    <header class="topbar">
      <div class="brand">
        <img src="/static/logo.jpg" alt="Logo" />
      </div>
      <nav class="nav-menu">
        <a href="/frontend/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/frontend/users.html"><i class="fa fa-user"></i> My Account</a>
        <a href="/frontend/createshipments.html"><i class="fa fa-box"></i> Create Shipment</a>
        <a href="/frontend/shipments.html"><i class="fa fa-box"></i> My Shipment</a>
        <a href="/frontend/create_device.html"><i class="fa fa-microchip"></i> Create Device Data</a>
        <a href="/frontend/device.html" class="active"><i class="fa fa-table"></i> Device Data</a>
        <a class="logout-btn" href="/frontend/logout.html"><i class="fa fa-sign-out-alt"></i> logout</a>
      </nav>
    </header>

    <main class="content">
      <h2><i class="fa fa-table"></i> Device Data</h2>
      <p class="form-note">Showing latest device data stored in MongoDB.</p>

      <div class="device-table-wrap" aria-live="polite">
        <div style="overflow:auto;">
          <table class="device-table" id="device-table" role="table">
            <thead>
              <tr>
                <th>Device Id</th>
                <th>Battery Level</th>
                <th>First Sensor temperature</th>
                <th>Route From</th>
                <th>Route To</th>
                <th>Timestamp</th>
              </tr>
            </thead>
            <tbody id="device-tbody">
              <!-- rows from backend -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    (function () {
      const tbody = document.getElementById('device-tbody');

      function escapeHtml(text) {
        return String(text ?? "")
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function addRow(d) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="device-id-badge">${escapeHtml(d.device_id)}</span></td>
          <td class="col-battery">${escapeHtml(d.battery_level)}</td>
          <td class="col-temp">${escapeHtml(d.first_sensor_temp)}</td>
          <td>${escapeHtml(d.route_from)}</td>
          <td>${escapeHtml(d.route_to)}</td>
          <td>${escapeHtml(d.timestamp)}</td>
        `;
        tbody.appendChild(tr);
      }

      fetch("http://127.0.0.1:8000/api/devices?limit=50")
        .then(res => res.json())
        .then(data => {
          if (Array.isArray(data)) {
            data.forEach(addRow);
          } else {
            console.error("Unexpected response:", data);
          }
        })
        .catch(err => console.error("Error loading device data:", err));
    })();
  </script>
</body>
</html>
