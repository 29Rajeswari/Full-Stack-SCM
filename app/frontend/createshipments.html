<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Shipment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      background-color: #e7e6e6;
      background-image: url('/static/OIP(10).jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 10px 10px;
    }

    .dashboard-container {
      background: #f7eaff;
      backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(151, 47, 182, 0.5);
      width: 90%;
      max-width: 1200px;
      padding: 20px 20px 20px 20px;
      color: #2c1040;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .brand img {
      height: 60px;
      border-radius: 5px;
      box-shadow: 0 4px 12px rgba(185, 231, 232, 0.2);
    }

     .nav-menu {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .nav-menu a,
    .logout-btn {
      color: #030006;
      font-weight: 700;
      text-decoration: none;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background-color 0.3s ease, color 0.3s ease;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 12px #9974d8;
    }

    .nav-menu a:hover,
    .logout-btn:hover {
      background: linear-gradient(90deg, #a327ae, #36b1f4);
      color: #fff;
      box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
      transform: translateY(-2px);
    }

    .nav-menu a.active {
      background: linear-gradient(90deg, #9c27b0, #673ab7);
      color: #fff;
    }

    .content h2 {
      font-size: 1.9rem;
      font-weight: 600;
      color: #3a155a;
      margin-bottom: 4px;
      text-shadow: 0 2px 3px rgba(238, 231, 231, 0.5);
    }

    .form-note {
      font-size: 1rem;
      color: #4a285f;
      margin-bottom: 18px;
      font-weight: 500;
    }

    form.shipment-form {
      background: #eee6ff;
      border-radius: 20px;
      padding: 25px 30px 30px 30px;
      box-shadow: 0 8px 40px rgba(82, 16, 144, 0.4);
    }

    .form-grid {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }

    .form-column {
      flex: 1;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-weight: 600;
      color: #280a3f;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    input[type="text"],
    input[type="date"],
    select,
    textarea {
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #c7aef0;
      font-size: 0.9rem;
      background: #f7f2ff;
      color: #311b4f;
      font-weight: 500;
      box-shadow: inset 0 2px 6px rgba(255, 255, 255, 0.7);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #7e3ff2;
      box-shadow: 0 0 0 2px rgba(126, 63, 242, 0.2);
      background: #ffffff;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .form-actions {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      gap: 20px;
    }

    button.btn-primary,
    button.btn-danger {
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(120, 87, 178, 0.7);
      transition: background 0.3s ease, transform 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button.btn-primary {
      background: linear-gradient(90deg, #9a64c7, #291696);
      color: #f7ecff;
    }

    button.btn-primary:hover {
      background: linear-gradient(90deg, #1e8449, #2980b9);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(39, 174, 96, 0.4);
    }

    button.btn-danger {
      background: linear-gradient(90deg, #f06292, #ffb74d);
      color: #4a148c;
    }

    button.btn-danger:hover {
      background: linear-gradient(90deg, #ffab91, #ffe082);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 183, 77, 0.4);
    }

    .result-message {
      margin-top: 15px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }
    .result-success {
      background: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #a5d6a7;
    }
    .result-error {
      background: #ffebee;
      color: #b71c1c;
      border: 1px solid #ef9a9a;
    }

    @media (max-width: 900px) {
      .form-grid {
        flex-direction: column;
      }
      .dashboard-container {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <img src="/static/logo.jpg" alt="Logo">
      </div>
      <nav class="nav-menu">
        <a href="/frontend/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/frontend/users.html"><i class="fa fa-user"></i> My Account</a>
        <a href="/frontend/createshipments.html" class="active"><i class="fa fa-plus"></i> Create Shipment</a>
        <a href="/frontend/shipments.html"><i class="fa fa-box"></i> My Shipments</a>
        <a href="/frontend/create_device.html"><i class="fa fa-microchip"></i> Create Device Data</a>
        <a href="/frontend/device.html"><i class="fa fa-table"></i> Device Data</a>
        <a class="logout-btn" href="/frontend/logout.html"><i class="fa fa-sign-out-alt"></i> Log out</a>
      </nav>
    </header>

    <main class="content">
      <h2>Create New Shipment</h2>
      <p class="form-note">Please fill all the details.</p>

      <form id="shipment-form" class="shipment-form">
        <div class="form-grid">
          <!-- Column 1 -->
          <div class="form-column">
            <label><i class="fa fa-barcode"></i> Shipment Number*</label>
            <input type="text" name="shipment_number" required />

            <label><i class="fa fa-route"></i> To Route Details*</label>
            <input type="text" name="route_to" placeholder="e.g., Chennai" required />

            <label><i class="fa fa-route"></i> From Route Details*</label>
            <input type="text" name="route_from" placeholder="e.g., Tirupati" required />

            <label><i class="fa fa-microchip"></i> Device*</label>
            <select name="device" required>
              <option value="">Select Device</option>
              <option>Device A</option>
              <option>Device B</option>
              <option>Device C</option>
            </select>

            <label><i class="fa fa-file-invoice"></i> PO Number*</label>
            <input type="text" name="po_number" required />

            <label><i class="fa fa-hashtag"></i> NDC Number*</label>
            <input type="text" name="ndc_number" required />

            <label><i class="fa fa-box-open"></i> Serial Number of Goods*</label>
            <input type="text" name="serial_goods" required />
          </div>

          <!-- Column 2 -->
          <div class="form-column">
            <label><i class="fa fa-box"></i> Container Number*</label>
            <input type="text" name="container_number" required />

            <label><i class="fa fa-tags"></i> Goods Type*</label>
            <select name="goods_type" required>
              <option value="">Select Goods</option>
              <option>Electronics</option>
              <option>Pharma</option>
              <option>Food</option>
            </select>

            <label><i class="fa fa-calendar-alt"></i> Expected Delivery Date*</label>
            <input type="date" name="expected_delivery_date" required />

            <label><i class="fa fa-truck"></i> Delivery Number*</label>
            <input type="text" name="delivery_number" required />

            <label><i class="fa fa-barcode"></i> Batch ID*</label>
            <input type="text" name="batch_id" required />

            <label><i class="fa fa-align-left"></i> Shipment Description*</label>
            <textarea name="description" required></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">
            <i class="fa fa-check"></i> CREATE SHIPMENT
          </button>
          <button type="reset" class="btn-danger">
            <i class="fa fa-eraser"></i> CLEAR DETAILS
          </button>
        </div>
      </form>

      <div id="result" class="result-message" style="display:none;"></div>
    </main>
  </div>

  <script>
    (function () {
      const form = document.getElementById("shipment-form");
      const resultBox = document.getElementById("result");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const formData = new FormData(form);
        const payload = new URLSearchParams();
        for (const [key, value] of formData.entries()) {
          payload.append(key, value);
        }

        try {
          const response = await fetch("http://127.0.0.1:8000/api/shipments/create", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
            },
            body: payload.toString(),
          });

          const text = await response.text();
          let json;
          try { json = JSON.parse(text); } catch { json = null; }

          if (!response.ok) {
            resultBox.style.display = "block";
            resultBox.className = "result-message result-error";
            resultBox.textContent = json?.detail || text || "Error creating shipment";
            return;
          }

          resultBox.style.display = "block";
          resultBox.className = "result-message result-success";
          resultBox.textContent = json?.message || "Shipment created successfully!";
          form.reset();
        } catch (err) {
          resultBox.style.display = "block";
          resultBox.className = "result-message result-error";
          resultBox.textContent = "Network error: " + err.message;
        }
      });
    })();
  </script>
</body>
</html>
