<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Users — SCMXpertLite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Prevent back/forward navigation -->
  <script>
    (function() {
      for (var i = 0; i < 5; i++) {
        history.pushState(null, null, location.href);
      }
      window.addEventListener('popstate', function(e) {
        history.pushState(null, null, location.href);
      });
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
          for (var i = 0; i < 5; i++) {
            history.pushState(null, null, location.href);
          }
        }
      });
    })();
  </script>

  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 0 20px 0;
      background: radial-gradient(circle at top left, #00eaff33, #001a33 40%),
                  radial-gradient(circle at bottom right, #ff00d433, #000814 60%),
                  #000814 !important;
      color: #ffffff;
    }

    .dashboard-container {
      background: rgba(9, 13, 32, 0.9) !important;
      border-radius: 32px !important;
      border: 1px solid rgba(143, 148, 251, 0.3) !important;
      box-shadow: 0 22px 45px rgba(104, 74, 255, 0.25) !important;
      color: #ffffff !important;
      width: 95%;
      max-width: 1400px;
      padding: 20px 25px;
      box-sizing: border-box;
      margin-top: 4px !important;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      background: rgba(9, 13, 32, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(143, 148, 251, 0.3);
      z-index: 1000;
      margin-bottom: 0 !important;
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand img {
      display: none !important;
    }

    .brand::before {
      content: "SCMXpertLite";
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #f6f4f7;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
    }

    .nav-menu {
      display: flex;
      gap: 12px !important;
      align-items: center;
      flex-wrap: nowrap !important;
      margin-left: 24px !important;
    }

    .topbar .nav-menu a,
    .topbar .logout-btn {
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      font-size: 12px !important;
      font-weight: 600 !important;
      padding: 8px 18px !important;
      border-radius: 999px !important;
      background: #ffffff !important;
      color: #1c1233 !important;
      box-shadow: 0 10px 24px rgba(138, 92, 255, 0.25) !important;
      white-space: nowrap !important;
      border: none !important;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
    }

    .topbar .nav-menu a.active {
      background: linear-gradient(135deg, #b06bff, #6b4dff) !important;
      color: #ffffff !important;
      box-shadow: 0 12px 30px rgba(120, 80, 255, 0.55) !important;
    }

    .topbar .nav-menu a:hover,
    .topbar .logout-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #b06bff, #6b4dff) !important;
      color: #ffffff !important;
      box-shadow: 0 14px 32px rgba(120, 80, 255, 0.7) !important;
    }

    .topbar .logout-btn {
      background: linear-gradient(135deg, #dc3545, #c82333) !important;
      color: #ffffff !important;
      box-shadow: 0 10px 24px rgba(220, 53, 69, 0.4) !important;
      padding: 8px 20px !important;
    }

    .topbar .logout-btn:hover {
      background: linear-gradient(135deg, #e04b59, #d42a3a) !important;
      box-shadow: 0 14px 34px rgba(220, 53, 69, 0.6) !important;
    }

    /* Content */
    .content {
      padding: 10px 10px 20px 10px;
    }

    .page-title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #f9f5ff !important;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 30px;
      color: #d0c8ff !important;
    }

    /* Search Bar */
    .search-container {
      max-width: 600px;
      margin: 0 auto 30px auto;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 50px;
      border-radius: 999px;
      background: rgba(10, 14, 38, 0.9);
      color: #ffffff;
      border: 1px solid rgba(145, 115, 255, 0.7);
      font-size: 15px;
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      transition: all 0.3s ease;
    }

    .search-input::placeholder {
      color: #7b7b9a;
    }

    .search-input:focus {
      outline: none;
      border-color: #b987ff;
      box-shadow: 0 0 0 3px rgba(185, 135, 255, 0.3);
    }

    .search-icon {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #7b7b9a;
      font-size: 18px;
      pointer-events: none;
    }

    /* User Cards Grid */
    .users-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
      padding: 10px;
    }

    .user-card {
      background: rgba(15, 20, 50, 0.85);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(127, 93, 255, 0.4);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .user-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 22px 50px rgba(104, 74, 255, 0.4);
    }

    .user-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(127, 93, 255, 0.2);
    }

    .user-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6b4dff, #b06bff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #ffffff;
      font-weight: 700;
    }

    .user-card-title {
      font-size: 20px;
      font-weight: 700;
      color: #f9f5ff;
      margin: 0;
      flex: 1;
      margin-left: 15px;
    }

    .user-form-group {
      margin-bottom: 18px;
    }

    .user-form-label {
      display: block;
      margin-bottom: 6px;
      color: #a9b2ff;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .user-form-value {
      padding: 10px 14px;
      background: rgba(10, 14, 38, 0.6);
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      border: 1px solid rgba(127, 93, 255, 0.2);
    }

    .user-form-value.email {
      color: #b987ff;
      font-weight: 500;
    }

    /* Role Badge */
    .role-badge {
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      display: inline-block;
    }

    .role-admin {
      background: rgba(255, 152, 0, 0.25);
      color: #ffb347;
      border: 1px solid rgba(255, 152, 0, 0.4);
    }

    .role-user {
      background: rgba(100, 181, 246, 0.25);
      color: #64b5f6;
      border: 1px solid rgba(100, 181, 246, 0.4);
    }

    /* Action Button */
    .edit-role-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      background: linear-gradient(135deg, #6b4dff, #b06bff);
      color: white;
      box-shadow: 0 4px 12px rgba(107, 77, 255, 0.4);
      margin-top: 10px;
    }

    .edit-role-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(107, 77, 255, 0.6);
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: rgba(9, 13, 32, 0.98);
      margin: 10% auto;
      padding: 40px;
      border-radius: 24px;
      width: 90%;
      max-width: 500px;
      border: 1px solid rgba(143, 148, 251, 0.4);
      box-shadow: 0 22px 45px rgba(104, 74, 255, 0.4);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      color: #f9f5ff;
      margin: 0;
    }

    .close-btn {
      color: #a9b2ff;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s;
    }

    .close-btn:hover {
      color: #ffffff;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      color: #a9b2ff;
      font-weight: 600;
      font-size: 14px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(10, 14, 38, 0.9);
      color: #ffffff;
      border: 1px solid rgba(145, 115, 255, 0.7);
      font-size: 15px;
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
    }

    .form-input:focus {
      outline: none;
      border-color: #b987ff;
      box-shadow: 0 0 0 2px rgba(185, 135, 255, 0.4);
    }

    .form-select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(10, 14, 38, 0.9);
      color: #ffffff;
      border: 1px solid rgba(145, 115, 255, 0.7);
      font-size: 15px;
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      cursor: pointer;
    }

    .form-select:focus {
      outline: none;
      border-color: #b987ff;
      box-shadow: 0 0 0 2px rgba(185, 135, 255, 0.4);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #6b4dff, #b06bff);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 5px 10px rgba(120, 80, 255, 0.4);
      transition: 0.2s ease-in-out;
      margin-top: 10px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 18px rgba(150, 90, 255, 0.5);
    }

    .error-msg {
      text-align: center;
      color: #ff6b6b;
      padding: 20px;
      font-size: 16px;
    }

    @media (max-width: 900px) {
      .dashboard-container {
        width: 96%;
        padding: 16px 14px 26px 14px;
      }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      .nav-menu {
        flex-wrap: wrap !important;
        margin-left: 0 !important;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Top Navigation -->
    <header class="topbar">
      <div class="brand">
        <img src="/static/logo.jpg" alt="Logo">
      </div>
      <nav class="nav-menu">
        <a href="/frontend/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/frontend/account.html"><i class="fa fa-user-circle"></i> My Account</a>
        <a href="/frontend/createshipments.html"><i class="fa fa-plus"></i> Create Shipment</a>
        <a href="/frontend/shipments.html"><i class="fa fa-box"></i> My Shipments</a>
        <a href="/frontend/live_streaming.html" id="nav-live-streaming"><i class="fa fa-microchip"></i> Live Streaming</a>
        <a href="/frontend/manage_users.html" class="active" id="nav-manage-users"><i class="fa fa-users"></i> Manage Users</a>
        <a class="logout-btn" href="/frontend/logout.html"><i class="fa fa-sign-out-alt"></i> Log out</a>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="content">
      <h1 class="page-title">Manage Users</h1>
      <p class="subtitle">View and manage user accounts and roles</p>

      <!-- Search Bar -->
      <div class="search-container">
        <i class="fa fa-search search-icon"></i>
        <input type="text" class="search-input" id="user-search" placeholder="Search by username or full name...">
      </div>

      <div class="users-grid" id="users-grid">
        <!-- User cards will be loaded here -->
      </div>

      <div id="error-message" class="error-msg" style="display:none;"></div>
    </main>
  </div>

  <!-- Edit Role Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Edit User Role</h2>
        <span class="close-btn">&times;</span>
      </div>
      <form id="editRoleForm">
        <input type="hidden" id="edit-username" name="username">
        
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="edit-fullname" class="form-input" readonly>
        </div>

        <div class="form-group">
          <label class="form-label">Email ID</label>
          <input type="email" id="edit-email" class="form-input" readonly>
        </div>

        <div class="form-group">
          <label class="form-label">Role</label>
          <select id="edit-role" class="form-select" required>
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <button type="submit" class="submit-btn">Update Role</button>
      </form>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("access_token");
    let allUsers = []; // Store all users for filtering
    
    // Check authentication
    if (!token) {
      alert("Please login to access this page.");
      window.location.href = "/frontend/users.html";
    }

    // Load users
    async function loadUsers() {
      try {
        const response = await fetch("/api/users", {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        if (response.status === 401) {
          localStorage.removeItem("access_token");
          alert("Session expired. Please login again.");
          window.location.href = "/frontend/users.html";
          return;
        }

        if (!response.ok) {
          throw new Error("Failed to load users");
        }

        allUsers = await response.json();
        displayUsers(allUsers);
      } catch (error) {
        console.error("Error:", error);
        document.getElementById("error-message").textContent = "Failed to load users";
        document.getElementById("error-message").style.display = "block";
      }
    }

    // Search functionality
    document.getElementById('user-search').addEventListener('input', function(e) {
      const searchTerm = e.target.value.toLowerCase().trim();
      
      if (!searchTerm) {
        displayUsers(allUsers);
        return;
      }

      const filteredUsers = allUsers.filter(user => {
        const fullName = (user.username || user.full_name || '').toLowerCase();
        const email = (user.email || '').toLowerCase();
        return fullName.includes(searchTerm) || email.includes(searchTerm);
      });

      displayUsers(filteredUsers);
    });

    // Display users in cards
    function displayUsers(users) {
      const grid = document.getElementById("users-grid");
      grid.innerHTML = "";

      if (!users || users.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#a9b2ff; font-size:16px;">No users found</div>';
        return;
      }

      users.forEach(user => {
        const role = user.role || "user";
        const fullName = user.username || user.full_name || "-";
        const email = user.email || "-";
        const firstLetter = fullName.charAt(0).toUpperCase();
        
        const card = document.createElement("div");
        card.className = "user-card";
        card.innerHTML = `
          <div class="user-card-header">
            <div class="user-avatar">${firstLetter}</div>
            <h3 class="user-card-title">${escapeHtml(fullName)}</h3>
          </div>
          
          <div class="user-form-group">
            <label class="user-form-label">Email ID</label>
            <div class="user-form-value email">${escapeHtml(email)}</div>
          </div>

          <div class="user-form-group">
            <label class="user-form-label">Role</label>
            <div class="user-form-value">
              <span class="role-badge ${role === 'admin' ? 'role-admin' : 'role-user'}">
                ${role.charAt(0).toUpperCase() + role.slice(1)}
              </span>
            </div>
          </div>

          <button class="edit-role-btn" data-username="${escapeHtml(user.username)}" data-fullname="${escapeHtml(fullName)}" data-email="${escapeHtml(email)}" data-role="${role}">
            <i class="fa fa-edit"></i> Edit Role
          </button>
        `;
        grid.appendChild(card);
      });

      // Add event listeners to edit buttons
      document.querySelectorAll('.edit-role-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          openEditModal(this.dataset.username, this.dataset.fullname, this.dataset.email, this.dataset.role);
        });
      });
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Modal functions
    const modal = document.getElementById("editModal");
    const closeBtn = document.querySelector(".close-btn");

    function openEditModal(username, fullname, email, role) {
      document.getElementById("edit-username").value = username;
      document.getElementById("edit-fullname").value = fullname;
      document.getElementById("edit-email").value = email;
      document.getElementById("edit-role").value = role;
      modal.style.display = "block";
    }

    closeBtn.onclick = function() {
      modal.style.display = "none";
    }

    window.onclick = function(event) {
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }

    // Handle form submission
    document.getElementById("editRoleForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      
      const username = document.getElementById("edit-username").value;
      const role = document.getElementById("edit-role").value;

      try {
        const response = await fetch(`/api/users/${username}/role`, {
          method: "PUT",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ role: role })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.detail || "Failed to update role");
        }

        alert("User role updated successfully!");
        modal.style.display = "none";
        loadUsers(); // Reload the table
      } catch (error) {
        console.error("Error:", error);
        alert("Error: " + error.message);
      }
    });

    // Load users on page load
    window.addEventListener("load", function() {
      loadUsers();
      
      // Role-based navigation visibility
      const userRole = localStorage.getItem("user_role") || "user";
      const liveStreamingNav = document.getElementById("nav-live-streaming");
      const manageUsersNav = document.getElementById("nav-manage-users");
      
      if (userRole === "admin") {
        // Admin: Show all navigation items
        if (liveStreamingNav) liveStreamingNav.style.display = "flex";
        if (manageUsersNav) manageUsersNav.style.display = "flex";
      } else {
        // Regular user: Hide Live Streaming and Manage Users
        if (liveStreamingNav) liveStreamingNav.style.display = "none";
        if (manageUsersNav) manageUsersNav.style.display = "none";
      }
    });
  </script>
</body>
</html>
