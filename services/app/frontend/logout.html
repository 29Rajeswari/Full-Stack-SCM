  <!-- Prevent back/forward navigation -->
  <script>
    (function() {
      for (var i = 0; i < 5; i++) {
        history.pushState(null, null, location.href);
      }
      window.addEventListener('popstate', function(e) {
        history.pushState(null, null, location.href);
      });
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
          for (var i = 0; i < 5; i++) {
            history.pushState(null, null, location.href);
          }
        }
      });
    })();
  </script>

    }

    button.btn-primary,
    button.btn-danger,
    a.btn-primary,
    a.btn-danger {

      font-weight: 900;

      box-shadow: 0 22px 45px rgba(104, 74, 255, 0.25) !important;
      color: #ffffff !important;
      margin-top: 4px !important;

    /* SCMXpertLite text logo (keep img in HTML, just hide it visually) */

    /* Navbar – pill buttons like other pages */

<body>
  <div class="dashboard-container">
    <!-- Top Navigation Bar -->
    <header class="topbar">
      <div class="brand">
        <img src="/static/logo.jpg" alt="Logo" />
      </div>
      <nav class="nav-menu">
        <a href="/frontend/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/frontend/account.html"><i class="fa fa-user-circle"></i> My Account</a>
        <a href="/frontend/createshipments.html"><i class="fa fa-plus"></i> Create Shipment</a>
        <a href="/frontend/shipments.html"><i class="fa fa-box"></i> My Shipments</a>
        <a href="/frontend/live_streaming.html"><i class="fa fa-microchip"></i> Live Streaming</a>
        
      </nav>
    </header>

    <!-- Logout Content -->
    <main class="content">
      <div class="logout-panel">
        <div class="logout-icon">
          <i class="fa fa-sign-out-alt"></i>
        </div>
        <h2>Ready to log out?</h2>
        <p class="main-text">
          You are about to sign out from <strong>SCMXpertLite</strong>.
        </p>
        <p class="sub-text">
          Any unsaved changes may be lost. You can always log in again to continue tracking your shipments and devices.
        </p>

        <div class="form-actions">
          <!-- Confirm logout -->
          <button id="confirmLogout" href="/frontend/account.html" class="btn-primary">
            <i class="fa fa-check"></i> Yes, Log Me Out
          </button>

          <!-- Cancel & go back -->
          <a href="/frontend/dashboard.html" class="btn-danger">
            <i class="fa fa-arrow-left"></i> Cancel & Go Back
          </a>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Get token from localStorage
    function getToken() {
      return localStorage.getItem("access_token");
    }

    // Handle logout confirmation
    document.getElementById("confirmLogout").addEventListener("click", async function() {
      const token = getToken();

      if (!token) {
        alert("No active session found. Redirecting to login...");
        window.location.href = "/frontend/users.html";
        return;
      }

      try {
        const response = await fetch("/logout", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          }
        });

        if (response.ok) {
          const data = await response.json();
          console.log("Logout successful:", data);

          // Clear token from localStorage
          localStorage.removeItem("access_token");
          localStorage.removeItem("user_role");
          localStorage.removeItem("username");

          // Build query params to show account details on the account page
          const params = new URLSearchParams();
          if (data.username) params.append("username", data.username);
          if (data.email) params.append("email", data.email);
          if (data.created_at) params.append("created_at", data.created_at);

          // Redirect to account page which will display logged-out account details
          window.location.href = `/frontend/account.html?${params.toString()}`;
        } else if (response.status === 401) {
          console.warn("Token expired or invalid");
          localStorage.removeItem("access_token");
          localStorage.removeItem("user_role");
          localStorage.removeItem("username");
          window.location.href = "/frontend/users.html";
        } else {
          throw new Error(`Logout failed with status ${response.status}`);
        }
      } catch (error) {
        console.error("Error during logout:", error);
        alert("An error occurred during logout. Please try again.");
      }
    });

    // Optional: Check authorization on page load
    window.addEventListener("load", async function() {
      const token = getToken();

      if (!token) {
        // No token, redirect to login
        window.location.href = "/frontend/users.html";
        return;
      }

      // Verify token is still valid
      try {
        const response = await fetch("/authorize", {
          method: "GET",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Content-Type": "application/json"
          }
        });

        if (!response.ok) {
          console.warn("Token is invalid or expired");
          localStorage.removeItem("access_token");
          localStorage.removeItem("user_role");
          localStorage.removeItem("username");
          window.location.href = "/frontend/users.html";
        }
      } catch (error) {
        console.error("Error verifying token:", error);
      }
    });
  </script>
</body>
