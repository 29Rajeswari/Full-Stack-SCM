    <!-- FRONTEND LOGIC -->
    <script>
      // Aggressive prevention - runs before anything else
      (function() {
        // Push multiple states to prevent back navigation
        for (var i = 0; i < 5; i++) {
          history.pushState(null, null, location.href);
        }
        
        // Handle popstate (back/forward clicks)
        window.addEventListener('popstate', function(e) {
          // Push state again immediately
          history.pushState(null, null, location.href);
        });
        
        // Handle pageshow (browser cache restoration)
        window.addEventListener('pageshow', function(e) {
          if (e.persisted) {
            for (var i = 0; i < 5; i++) {
              history.pushState(null, null, location.href);
            }
          }
        });
      })();

      document.addEventListener("DOMContentLoaded", function () {

        (function preventAutofillAndClear() {
          const loginForm = document.getElementById("form-login");
          const userEl = document.getElementById("username-login");
          const passEl = document.getElementById("password-login");

          if (!loginForm || (!userEl && !passEl)) return;

          try { loginForm.setAttribute("autocomplete", "off"); } catch {}

          [userEl, passEl].forEach(el => {
            if (!el) return;
            try {
              el.setAttribute("autocomplete", "off");
              el.setAttribute("autocorrect", "off");
              el.setAttribute("autocapitalize", "none");
              el.setAttribute("spellcheck", "false");
            } catch {}
            // Clear any pre-filled value
            el.value = "";
            // Make readonly briefly to block autofill
            el.readOnly = true;
          });
          
          // Unset readonly shortly after to allow typing
          setTimeout(() => {
            [userEl, passEl].forEach(el => { if (el) el.readOnly = false; });
          }, 50);

          // Clear again on window load (some browsers fill later)
          window.addEventListener("load", () => {
            setTimeout(() => {
              [userEl, passEl].forEach(el => { if (el) el.value = ""; });
            }, 120);
          });

          // Clear on focus (if browser attempts to refill on focus)
          [userEl, passEl].forEach(el => {
            if (!el) return;
            el.addEventListener("focus", () => { el.value = ""; });
          });

          // Also set autocomplete off for all inputs inside the form
          loginForm.querySelectorAll('input').forEach(i => { try { i.setAttribute('autocomplete','off'); } catch {} });
        })();
 

        /* ========== LOGIN ========== */
        const loginForm = document.getElementById("form-login");
        if (loginForm) {
          loginForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            const username = document.getElementById("username-login").value.trim();
            const password = document.getElementById("password-login").value;

            const params = new URLSearchParams();
            params.append("username", username);
            params.append("password", password);

            try {
              const response = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const text = await response.text();
              let data = null;
              try { data = JSON.parse(text); } catch {}

              if (!response.ok) {
                alert((data && data.detail) || text || "Login failed");
                return;
              }

              if (data && data.access_token) {
                localStorage.setItem("access_token", data.access_token);
                localStorage.setItem("user_role", data.role || "user");
                localStorage.setItem("username", data.username || "");
              }

              alert("Login successful!");
              window.location.href = "/frontend/dashboard.html";
            } catch (err) {
              alert("Network error: " + err.message);
            }
          });
        }

        /* ========== SIGNUP ========== */
        const signupForm = document.getElementById("form-signup");
        const signUpBtn  = document.getElementById("signUp");

        if (signupForm && signUpBtn) {
          signUpBtn.addEventListener("click", async function (e) {
            e.preventDefault();

            const email    = document.getElementById("email").value.trim();
            const username = document.getElementById("username-signup").value.trim();
            const password = document.getElementById("password-signup").value;
            const confirm  = document.getElementById("confirm-password").value;

            if (!email || !username || !password || !confirm) {
              alert("Please fill all the signup fields.");
              return;
            }

            const params = new URLSearchParams();
            params.append("email", email);
            params.append("username", username);
            params.append("password", password);
            params.append("confirm_password", confirm);

            try {
              const response = await fetch("/signup", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const text = await response.text();
              let data = null;
              try { data = JSON.parse(text); } catch {}

              if (!response.ok) {
                alert((data?.detail) || "Sign up failed");
                return;
              }

              alert("Your account has been created");
              signupForm.reset();
            } catch (err) {
              alert("Network error: " + err.message);
            }
          });
        }

        /* ========== FORGOT PASSWORD POPUP (STEP FLOW) ========== */
        const forgotOverlay   = document.getElementById("forgot-overlay");
        const openForgotBtn   = document.getElementById("open-forgot");
        const closeForgotBtn  = document.getElementById("close-forgot");

        if (openForgotBtn) openForgotBtn.addEventListener("click", () => {
          forgotOverlay.classList.add("show");
          resetForgotModalUI();
        });
        if (closeForgotBtn) closeForgotBtn.addEventListener("click", () => forgotOverlay.classList.remove("show"));
        if (forgotOverlay) {
          forgotOverlay.addEventListener("click", function (e) {
            if (e.target === forgotOverlay) forgotOverlay.classList.remove("show");
          });
        }

        // Elements inside modal
        const forgotEmailInput           = document.getElementById("forgot-email");
        const forgotOtpInput             = document.getElementById("forgot-otp");
        const forgotNewPasswordInput     = document.getElementById("forgot-new-password");
        const forgotConfirmPasswordInput = document.getElementById("forgot-confirm-password");

        const stepEmail    = document.getElementById("fp-step-email");
        const stepOtp      = document.getElementById("fp-step-otp");
        const stepPassword = document.getElementById("fp-step-password");

        const forgotSendOtpBtn    = document.getElementById("forgot-send-otp");
        const forgotVerifyOtpBtn  = document.getElementById("forgot-verify-otp");
        const forgotResetBtn      = document.getElementById("forgot-reset-btn");

        function resetForgotModalUI() {
          if (forgotEmailInput)  forgotEmailInput.value  = "";
          if (forgotOtpInput)    forgotOtpInput.value    = "";
          if (forgotNewPasswordInput)     forgotNewPasswordInput.value     = "";
          if (forgotConfirmPasswordInput) forgotConfirmPasswordInput.value = "";

          if (stepEmail)    stepEmail.style.display    = "block";
          if (stepOtp)      stepOtp.style.display      = "none";
          if (stepPassword) stepPassword.style.display = "none";
        }

        // Allow only digits for OTP, max 5 chars
        if (forgotOtpInput) {
          forgotOtpInput.addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, "").slice(0, 5);
          });
        }

        // STEP 1: Send OTP (asks only email)
        if (forgotSendOtpBtn) {
          forgotSendOtpBtn.addEventListener("click", async function () {
            const email = (forgotEmailInput?.value || "").trim();

            if (!email) {
              alert("Please enter your email to receive OTP.");
              return;
            }

            const params = new URLSearchParams();
            params.append("email", email);

            try {
              const response = await fetch("/forgot-password", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const text = await response.text();
              let data = null;
              try { data = JSON.parse(text); } catch {}

              if (!response.ok) {
                alert((data && data.detail) || text || "Failed to send OTP");
                return;
              }

              // Pop-up info
              alert("A 5-digit OTP has been sent to your email.");

              // Move to STEP 2 – show OTP section
              if (stepOtp)   stepOtp.style.display = "block";
              if (stepEmail) stepEmail.style.display = "block"; // keep email visible but user can edit if needed
              if (forgotOtpInput) forgotOtpInput.focus();

            } catch (err) {
              alert("Network error: " + err.message);
            }
          });
        }

        // STEP 2: Verify OTP (front-end step; real check happens on reset)
        if (forgotVerifyOtpBtn) {
          forgotVerifyOtpBtn.addEventListener("click", function () {
            const otp = (forgotOtpInput?.value || "").trim();

            if (!otp) {
              alert("Please enter the OTP you received.");
              return;
            }
            if (otp.length !== 5 || !/^\d{5}$/.test(otp)) {
              alert("Please enter the 5-digit numeric OTP.");
              return;
            }

            // OTP "verified" for UI; real validation occurs on /reset-password
            alert("OTP verified. Please set your new password.");

            // Show STEP 3 – password fields
            if (stepPassword) stepPassword.style.display = "block";
            if (forgotNewPasswordInput) forgotNewPasswordInput.focus();
          });
        }

        // STEP 3: Reset Password (calls backend, validates OTP + new password)
        if (forgotResetBtn) {
          forgotResetBtn.addEventListener("click", async function () {
            const email   = (forgotEmailInput?.value || "").trim();
            const otp     = (forgotOtpInput?.value || "").trim();
            const newPass = (forgotNewPasswordInput?.value || "");
            const confirm = (forgotConfirmPasswordInput?.value || "");

            if (!email || !otp || !newPass || !confirm) {
              alert("Please fill Email, OTP, New Password and Confirm Password.");
              return;
            }

            if (otp.length !== 5 || !/^\d{5}$/.test(otp)) {
              alert("Please enter the 5-digit numeric OTP.");
              return;
            }

            const params = new URLSearchParams();
            params.append("email", email);
            params.append("otp", otp);
            params.append("new_password", newPass);
            params.append("confirm_password", confirm);

            try {
              const response = await fetch("/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const text = await response.text();
              let data = null;
              try { data = JSON.parse(text); } catch {}

              if (!response.ok) {
                alert((data && data.detail) || text || "Failed to reset password");
                return;
              }

              alert("Your password has been reset successfully. Please log in with your new password.");
              if (forgotOverlay) forgotOverlay.classList.remove("show");
              resetForgotModalUI();
            } catch (err) {
              alert("Network error: " + err.message);
            }
          });
        }
      });

      // ========== GOOGLE SSO CALLBACK ==========
      async function handleGoogleCredentialResponse(response) {
        try {
          const id_token = response.credential;

          const res = await fetch("/auth/google", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ id_token: id_token })
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert("Google login failed: " + (err.detail || res.statusText));
            return;
          }

          const data = await res.json();

          if (data.access_token) {
            localStorage.setItem("access_token", data.access_token);
          }

          alert("Logged in with Google: " + (data.email || "User"));
          window.location.href = "/frontend/dashboard.html";
        } catch (e) {
          console.error(e);
          alert("Error during Google login");
        }
      }

      window.handleGoogleCredentialResponse = handleGoogleCredentialResponse;
    </script>

    <script>

          $('#slideBox').animate({'marginLeft' : '0'});
          $('.topLayer').animate({'marginLeft' : '100%'});

            $('#slideBox').animate({'marginLeft' : '50%'});
          } else {
            $('#slideBox').animate({'marginLeft' : '20%'});
          }
          $('.topLayer').animate({'marginLeft': '0'});
        });
      });

        var p5 = { x: canvasWidth - 130, y: canvasHeight - 75 };
        var p6 = { x: canvasMiddleX + 80, y: canvasHeight - 50 };
        var p7 = { x: canvasWidth + 60, y: canvasMiddleY - 50 };
        var p8 = { x: canvasMiddleX + 100, y: canvasMiddleY + 100 };

        positionArray = [p3, p2, p5, p4, p1, p6, p7, p8];
      }

      function initializeShapes() {

        var paths = [

          'M0,0l64,219L29,343l535,30L478,37l-133,4L0,0z',
