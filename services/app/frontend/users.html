<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Roboto:300,400,600' rel='stylesheet' type='text/css'>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.11.3/paper-full.min.js"></script>

    <!-- Google reCAPTCHA v2 -->
    <script>
      console.log('Loading reCAPTCHA v2 script...');
      console.log('Site key: 6Lch9agsAAAAALm_jjlLL602Pi-4McTfuI4MFhmd');
      console.log('Timestamp:', new Date().toISOString());
      
      // Check if we can reach Google's servers
      fetch('https://www.google.com/recaptcha/api.js', { method: 'HEAD', mode: 'no-cors' })
        .then(() => console.log('✓ Can reach Google reCAPTCHA servers'))
        .catch(err => console.error('✗ Cannot reach Google reCAPTCHA servers:', err));
    </script>
    <script src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoaded&render=explicit"></script>
    
    <script>
      // Global callback for reCAPTCHA load
      window.onRecaptchaLoaded = function() {
        console.log('✓ reCAPTCHA API loaded successfully at', new Date().toISOString());
        console.log('grecaptcha object:', typeof grecaptcha);
        console.log('Available grecaptcha methods:', Object.keys(grecaptcha || {}));
        
        // Check which version of reCAPTCHA is loaded
        const hasRender = typeof grecaptcha.render === 'function';
        const hasExecute = typeof grecaptcha.execute === 'function';
        
        console.log('grecaptcha.render available:', hasRender);
        console.log('grecaptcha.execute available:', hasExecute);
        
        if (hasRender) {
          console.log('✓ reCAPTCHA v2 (Checkbox) detected - render function available');
          if (window.initRecaptchaNow) {
            console.log('Calling initRecaptchaNow...');
            window.initRecaptchaNow();
          } else {
            console.warn('initRecaptchaNow not yet defined, will retry on DOMContentLoaded');
          }
        } else if (hasExecute) {
          console.error('✗ reCAPTCHA v3 (Invisible) detected - this page requires reCAPTCHA v2!');
          console.error('   Please use a reCAPTCHA v2 site key from Google Admin Console');
          console.error('   Site key should be for "reCAPTCHA v2" > "I\'m not a robot" Checkbox');
          
          // Show error in container
          setTimeout(() => {
            const container = document.getElementById('g-recaptcha-container');
            if (container) {
              container.innerHTML = `
                <div class="recaptcha-error">
                  <strong>⚠ Wrong reCAPTCHA Version</strong><br><br>
                  The site key is for reCAPTCHA v3 (invisible), but this form needs reCAPTCHA v2 (checkbox).<br><br>
                  <strong>Solution:</strong><br>
                  1. Go to <a href="https://www.google.com/recaptcha/admin" target="_blank">Google reCAPTCHA Admin</a><br>
                  2. Create a new key with type: <strong>reCAPTCHA v2</strong><br>
                  3. Choose: <strong>"I'm not a robot" Checkbox</strong><br>
                  4. Update the site key in users.html and .env file
                </div>`;
            }
          }, 500);
        } else {
          console.error('✗ reCAPTCHA loaded but neither render nor execute functions found!');
        }
      };
    </script>

    <!-- Google Identity Services (for default Google Sign-In button) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- FRONTEND LOGIC -->
    <script>
      // Aggressive prevention - runs before anything else
      (function() {
        // Push multiple states to prevent back navigation
        for (var i = 0; i < 5; i++) {
          history.pushState(null, null, location.href);
        }
        
        // Handle popstate (back/forward clicks)
        window.addEventListener('popstate', function(e) {
          // Push state again immediately
          history.pushState(null, null, location.href);
        });
        
        // Handle pageshow (browser cache restoration)
        window.addEventListener('pageshow', function(e) {
          if (e.persisted) {
            for (var i = 0; i < 5; i++) {
              history.pushState(null, null, location.href);
            }
          }
        });
      })();

      document.addEventListener("DOMContentLoaded", function () {

        // Initialize reCAPTCHA explicitly
        let recaptchaWidgetId = null;
        let isInitializing = false; // Prevent multiple simultaneous initializations
        
        function initRecaptcha() {
          // Prevent multiple simultaneous initializations
          if (isInitializing) {
            console.log('Initialization already in progress, skipping...');
            return false;
          }
          
          // If already initialized, don't try again
          if (recaptchaWidgetId !== null) {
            console.log('reCAPTCHA already initialized with widget ID:', recaptchaWidgetId);
            return true;
          }
          
          if (typeof grecaptcha === 'undefined') {
            console.warn('⚠ grecaptcha is undefined - reCAPTCHA script not loaded yet');
            console.warn('   This usually means:');
            console.warn('   1. Google servers are unreachable');
            console.warn('   2. Ad blocker is blocking the script');
            console.warn('   3. Network issue');
            return false;
          }
          
          console.log('✓ grecaptcha object is available');
          console.log('grecaptcha.render type:', typeof grecaptcha.render);
          
          // Verify render function exists
          if (typeof grecaptcha.render !== 'function') {
            console.error('✗ grecaptcha.render is not a function!');
            console.error('   Available grecaptcha methods:', Object.keys(grecaptcha));
            return false;
          }
          
          isInitializing = true; // Set flag to prevent concurrent calls
          
          try {
            const container = document.getElementById('g-recaptcha-container');
            if (!container) {
              console.error('✗ reCAPTCHA container element not found in DOM');
              isInitializing = false;
              return false;
            }
            
            // Check if container already has content (prevent duplicate rendering)
            if (container.children.length > 0) {
              console.log('Container already has content, clearing it first...');
              container.innerHTML = '';
            }
            
            // Check if container is visible
            const rect = container.getBoundingClientRect();
            console.log('Container dimensions:', rect.width, 'x', rect.height);
            console.log('Container is visible:', rect.width > 0 && rect.height > 0);
            
            const siteKey = '6Lch9agsAAAAALm_jjlLL602Pi-4McTfuI4MFhmd';
            console.log('Rendering reCAPTCHA with site key:', siteKey);
            
            // Use setTimeout to ensure DOM is ready
            setTimeout(() => {
              try {
                recaptchaWidgetId = grecaptcha.render(container, {
                  'sitekey': siteKey,
                  'theme': 'light',
                  'callback': function(response) {
                    console.log('✓ reCAPTCHA verified successfully');
                    console.log('Response token length:', response.length);
                  },
                  'expired-callback': function() {
                    console.warn('⚠ reCAPTCHA expired, please verify again');
                  },
                  'error-callback': function() {
                    console.error('✗ reCAPTCHA error occurred');
                  }
                });
                console.log('✓ reCAPTCHA initialized successfully with widget ID:', recaptchaWidgetId);
                isInitializing = false;
              } catch (renderError) {
                console.error('✗ Error during grecaptcha.render:', renderError);
                isInitializing = false;
                throw renderError;
              }
            }, 100);
            
            return true;
          } catch (error) {
            console.error('✗ reCAPTCHA initialization error:', error.message);
            console.error('Stack trace:', error.stack);
            isInitializing = false;
            return false;
          }
        }

        // Expose init function for onload callback
        window.initRecaptchaNow = initRecaptcha;

        // Polling mechanism to wait for grecaptcha.render
        let pollCount = 0;
        const maxPolls = 20; // 10 seconds total (500ms * 20)
        let pollStarted = false; // Ensure polling only starts once
        
        function waitForRecaptchaRender() {
          if (pollStarted) {
            return; // Prevent multiple polling loops
          }
          pollStarted = true;
          
          function poll() {
            pollCount++;
            
            // If already initialized, stop polling
            if (recaptchaWidgetId !== null) {
              console.log('✓ Polling stopped - reCAPTCHA already initialized');
              return;
            }
            
            if (typeof grecaptcha === 'undefined') {
              console.log(`Poll ${pollCount}/${maxPolls}: grecaptcha not loaded yet...`);
              if (pollCount < maxPolls) {
                setTimeout(poll, 500);
              } else {
                console.error('✗ Polling timed out waiting for grecaptcha');
              }
              return;
            }
            
            if (typeof grecaptcha.render !== 'function') {
              console.log(`Poll ${pollCount}/${maxPolls}: grecaptcha.render not available yet...`);
              console.log('   Available methods:', Object.keys(grecaptcha));
              if (pollCount < maxPolls) {
                setTimeout(poll, 500);
              } else {
                console.error('✗ Polling timed out waiting for grecaptcha.render');
              }
              return;
            }
            
            console.log(`✓ grecaptcha.render is ready after ${pollCount} polls`);
            initRecaptcha();
          }
          
          // Start polling
          poll();
        }
        
        // Start polling immediately
        waitForRecaptchaRender();

        // Try to initialize on DOMContentLoaded (but polling should handle it)
        setTimeout(function() {
          console.log('DOMContentLoaded timeout check...');
          console.log('grecaptcha available:', typeof grecaptcha !== 'undefined');
          console.log('Already initialized:', recaptchaWidgetId !== null);
          if (recaptchaWidgetId === null && !isInitializing) {
            console.log('Attempting manual initialization...');
            initRecaptcha();
          }
        }, 1000);
        
        // Retry on window load
        window.addEventListener('load', function() {
          setTimeout(function() {
            console.log('Window load check...');
            if (recaptchaWidgetId === null && !isInitializing) {
              console.log('Retrying reCAPTCHA initialization after page load...');
              initRecaptcha();
            }
          }, 500);
        });
        
        // Final retry attempt
        setTimeout(function() {
          if (recaptchaWidgetId === null && !isInitializing) {
            console.warn('⚠ Final retry: Attempting to initialize reCAPTCHA...');
            
            // Try to manually inject the script if it didn't load
            if (typeof grecaptcha === 'undefined') {
              console.log('Attempting manual script injection...');
              const script = document.createElement('script');
              script.src = 'https://www.google.com/recaptcha/api.js?render=explicit';
              script.onload = function() {
                console.log('✓ Manual script injection successful');
                setTimeout(initRecaptcha, 200);
              };
              script.onerror = function() {
                console.error('✗ Manual script injection failed');
              };
              document.head.appendChild(script);
            } else {
              initRecaptcha();
            }
            
            // If still not loaded after final retry, show error message and reload button
            setTimeout(function() {
              if (recaptchaWidgetId === null) {
                const container = document.getElementById('g-recaptcha-container');
                const reloadBtn = document.getElementById('reload-recaptcha');
                if (container) {
                  container.innerHTML = `
                    <div class="recaptcha-error">
                      <strong>⚠ reCAPTCHA failed to load</strong><br><br>
                      Possible causes:<br>
                      • Internet connection issue<br>
                      • Ad blocker or firewall blocking Google services<br>
                      • Site key not registered for this domain<br><br>
                      <small>Check browser console (F12) for details</small>
                    </div>`;
                }
                if (reloadBtn) {
                  reloadBtn.style.display = 'block';
                }
                console.error('✗ reCAPTCHA failed to load after all retry attempts');
                console.error('Please check:');
                console.error('1. Is your internet connection working?');
                console.error('2. Are you using an ad blocker? Try disabling it.');
                console.error('3. Is the site key registered for your domain in Google reCAPTCHA admin?');
                console.error('4. Check Network tab for blocked requests to google.com');
              }
            }, 2000);
          }
        }, 5000);

        // Reload reCAPTCHA button handler
        const reloadRecaptchaBtn = document.getElementById('reload-recaptcha');
        if (reloadRecaptchaBtn) {
          reloadRecaptchaBtn.addEventListener('click', function() {
            console.log('Reloading reCAPTCHA...');
            const container = document.getElementById('g-recaptcha-container');
            if (container) {
              // Reset all state
              container.innerHTML = '';
              recaptchaWidgetId = null;
              isInitializing = false;
              pollCount = 0;
              pollStarted = false;
              reloadRecaptchaBtn.style.display = 'none';
              
              // Restart polling
              console.log('Restarting reCAPTCHA initialization...');
              setTimeout(waitForRecaptchaRender, 100);
            }
          });
        }

        (function preventAutofillAndClear() {
          const loginForm = document.getElementById("form-login");
          const userEl = document.getElementById("username-login");
          const passEl = document.getElementById("password-login");

          if (!loginForm || (!userEl && !passEl)) return;

          try { loginForm.setAttribute("autocomplete", "off"); } catch {}

          [userEl, passEl].forEach(el => {
            if (!el) return;
            try {
              el.setAttribute("autocomplete", "off");
              el.setAttribute("autocorrect", "off");
              el.setAttribute("autocapitalize", "none");
              el.setAttribute("spellcheck", "false");
            } catch {}
            // Clear any pre-filled value
            el.value = "";
            // Make readonly briefly to block autofill
            el.readOnly = true;
          });
          
          // Unset readonly shortly after to allow typing
          setTimeout(() => {
            [userEl, passEl].forEach(el => { if (el) el.readOnly = false; });
          }, 50);

          // Clear again on window load (some browsers fill later)
          window.addEventListener("load", () => {
            setTimeout(() => {
              [userEl, passEl].forEach(el => { if (el) el.value = ""; });
            }, 120);
          });

          // Clear on focus (if browser attempts to refill on focus)
          [userEl, passEl].forEach(el => {
            if (!el) return;
            el.addEventListener("focus", () => { el.value = ""; });
          });

          // Also set autocomplete off for all inputs inside the form
          loginForm.querySelectorAll('input').forEach(i => { try { i.setAttribute('autocomplete','off'); } catch {} });
        })();
 

        /* ========== LOGIN ========== */
        const loginForm = document.getElementById("form-login");
        if (loginForm) {
          loginForm.addEventListener("submit", async function (e) {
            e.preventDefault();

            const username = document.getElementById("username-login").value.trim();
            const password = document.getElementById("password-login").value;

            const params = new URLSearchParams();
            params.append("username", username);
            params.append("password", password);

            try {
              const response = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const text = await response.text();
              let data = null;
              try { data = JSON.parse(text); } catch {}

              if (!response.ok) {
                alert((data && data.detail) || text || "Login failed");
                return;
              }

              if (data && data.access_token) {
                localStorage.setItem("access_token", data.access_token);
                localStorage.setItem("user_role", data.role || "user");
                localStorage.setItem("username", data.username || "");
              }

              alert("Login successful!");
              window.location.href = "/frontend/dashboard.html";
            } catch (err) {
              alert("Network error: " + err.message);
            }
          });
        }

        /* ========== SIGNUP WITH OTP ========== */
        const signupForm = document.getElementById("form-signup");
        const signUpBtn  = document.getElementById("signUp");
        const sendOtpBtn = document.getElementById("send-otp-btn");
        const verifyOtpBtn = document.getElementById("verify-otp-btn");
        const resendOtpBtn = document.getElementById("resend-otp-btn");
        const otpSection = document.getElementById("otp-section");
        const sendOtpSection = document.getElementById("send-otp-section");
        const otpInput = document.getElementById("otp-input");
        const otpStatus = document.getElementById("otp-status");
        const emailInput = document.getElementById("email");

        let isEmailVerified = false;
        let currentEmail = "";

        // Send OTP button handler
        if (sendOtpBtn) {
          sendOtpBtn.addEventListener("click", async function() {
            const email = emailInput.value.trim();
            
            if (!email) {
              alert("Please enter your email address first.");
              return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
              alert("Please enter a valid email address.");
              return;
            }

            currentEmail = email;
            sendOtpBtn.disabled = true;
            sendOtpBtn.textContent = "Sending...";

            try {
              const params = new URLSearchParams();
              params.append("email", email);

              const response = await fetch("/signup/send-otp", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const data = await response.json();

              if (!response.ok) {
                alert(data.detail || "Failed to send OTP");
                sendOtpBtn.disabled = false;
                sendOtpBtn.textContent = "Send OTP to Email";
                return;
              }

              // Show OTP input section
              sendOtpSection.style.display = "none";
              otpSection.style.display = "block";
              otpStatus.textContent = "OTP sent to " + email;
              otpStatus.style.color = "#4caf50";
              sendOtpBtn.textContent = "OTP Sent";
              
            } catch (err) {
              alert("Network error: " + err.message);
              sendOtpBtn.disabled = false;
              sendOtpBtn.textContent = "Send OTP to Email";
            }
          });
        }

        // Verify OTP button handler
        if (verifyOtpBtn) {
          verifyOtpBtn.addEventListener("click", async function() {
            const otp = otpInput.value.trim();
            
            if (!otp || otp.length !== 6) {
              alert("Please enter a valid 6-digit OTP.");
              return;
            }

            verifyOtpBtn.disabled = true;
            verifyOtpBtn.textContent = "Verifying...";

            try {
              const params = new URLSearchParams();
              params.append("email", currentEmail);
              params.append("otp", otp);

              const response = await fetch("/signup/verify-otp", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const data = await response.json();

              if (!response.ok) {
                alert(data.detail || "Invalid OTP");
                otpStatus.textContent = "Verification failed";
                otpStatus.style.color = "#f44336";
                verifyOtpBtn.disabled = false;
                verifyOtpBtn.textContent = "Verify OTP";
                return;
              }

              // OTP verified successfully
              isEmailVerified = true;
              otpSection.style.display = "none";
              otpStatus.textContent = "Email verified successfully!";
              otpStatus.style.color = "#4caf50";
              signUpBtn.disabled = false;
              alert("Email verified successfully! You can now complete your signup.");
              
            } catch (err) {
              alert("Network error: " + err.message);
              otpStatus.textContent = "Verification failed";
              otpStatus.style.color = "#f44336";
              verifyOtpBtn.disabled = false;
              verifyOtpBtn.textContent = "Verify OTP";
            }
          });
        }

        // Resend OTP button handler
        if (resendOtpBtn) {
          resendOtpBtn.addEventListener("click", async function() {
            if (!currentEmail) {
              alert("Please enter your email first.");
              return;
            }

            resendOtpBtn.disabled = true;
            resendOtpBtn.textContent = "Resending...";

            try {
              const params = new URLSearchParams();
              params.append("email", currentEmail);

              const response = await fetch("/signup/send-otp", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const data = await response.json();

              if (!response.ok) {
                alert(data.detail || "Failed to resend OTP");
                resendOtpBtn.disabled = false;
                resendOtpBtn.textContent = "Resend OTP";
                return;
              }

              otpStatus.textContent = "New OTP sent to " + currentEmail;
              otpStatus.style.color = "#4caf50";
              resendOtpBtn.textContent = "Resend OTP";
              resendOtpBtn.disabled = false;
              otpInput.value = "";
              
            } catch (err) {
              alert("Network error: " + err.message);
              resendOtpBtn.disabled = false;
              resendOtpBtn.textContent = "Resend OTP";
            }
          });
        }

        // Signup button handler (after OTP verification)
        if (signupForm && signUpBtn) {
          signUpBtn.addEventListener("click", async function (e) {
            e.preventDefault();

            const firstName = document.getElementById("firstname-signup").value.trim();
            const lastName = document.getElementById("lastname-signup").value.trim();
            const password = document.getElementById("password-signup").value;
            const confirm  = document.getElementById("confirm-password").value;
          
            if (!firstName || !lastName || !password || !confirm) {
              alert("Please fill all the signup fields.");
              return;
            }

            // Check if email is provided and verified
            if (!currentEmail) {
              alert("Please enter your email and complete OTP verification.");
              return;
            }

            if (!isEmailVerified) {
              alert("Please verify your email with OTP first.");
              return;
            }

            // Try to get reCAPTCHA response (optional - won't block if not available)
            let recaptchaResponse = null;
            if (typeof grecaptcha !== 'undefined' && recaptchaWidgetId !== null) {
              try {
                recaptchaResponse = grecaptcha.getResponse(recaptchaWidgetId);
              } catch (err) {
                console.warn('reCAPTCHA not available, proceeding without it:', err);
              }
            }

            const params = new URLSearchParams();
            params.append("first_name", firstName);
            params.append("last_name", lastName);
            params.append("email", currentEmail);
            params.append("password", password);
            params.append("confirm_password", confirm);
            params.append("otp_verified", "true");
            
            // Add reCAPTCHA response only if available
            if (recaptchaResponse) {
              params.append("g-recaptcha-response", recaptchaResponse);
            }

            try {
              const response = await fetch("/signup", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const text = await response.text();
              let data = null;
              try { data = JSON.parse(text); } catch {}

              if (!response.ok) {
                alert((data?.detail) || "Sign up failed");
                return;
              }

              alert("Your account has been created");
              signupForm.reset();
              
              // Reset reCAPTCHA if available
              if (typeof grecaptcha !== 'undefined' && recaptchaWidgetId !== null) {
                try {
                  grecaptcha.reset(recaptchaWidgetId);
                } catch (err) {
                  console.warn('Could not reset reCAPTCHA:', err);
                }
              }
              
              // Reset OTP verification state
              isEmailVerified = false;
              currentEmail = "";
              otpSection.style.display = "none";
              sendOtpSection.style.display = "block";
              sendOtpBtn.disabled = false;
              sendOtpBtn.textContent = "Send OTP to Email";
              otpStatus.textContent = "";
              
            } catch (err) {
              alert("Network error: " + err.message);
            }
          });
        }

        /* ========== FORGOT PASSWORD POPUP (STEP FLOW) ========== */
        const forgotOverlay   = document.getElementById("forgot-overlay");
        const openForgotBtn   = document.getElementById("open-forgot");
        const closeForgotBtn  = document.getElementById("close-forgot");

        if (openForgotBtn) openForgotBtn.addEventListener("click", () => {
          forgotOverlay.classList.add("show");
          resetForgotModalUI();
        });
        if (closeForgotBtn) closeForgotBtn.addEventListener("click", () => forgotOverlay.classList.remove("show"));
        if (forgotOverlay) {
          forgotOverlay.addEventListener("click", function (e) {
            if (e.target === forgotOverlay) forgotOverlay.classList.remove("show");
          });
        }

        // Elements inside modal
        const forgotEmailInput           = document.getElementById("forgot-email");
        const forgotOtpInput             = document.getElementById("forgot-otp");
        const forgotNewPasswordInput     = document.getElementById("forgot-new-password");
        const forgotConfirmPasswordInput = document.getElementById("forgot-confirm-password");

        const stepEmail    = document.getElementById("fp-step-email");
        const stepOtp      = document.getElementById("fp-step-otp");
        const stepPassword = document.getElementById("fp-step-password");

        const forgotSendOtpBtn    = document.getElementById("forgot-send-otp");
        const forgotVerifyOtpBtn  = document.getElementById("forgot-verify-otp");
        const forgotResetBtn      = document.getElementById("forgot-reset-btn");

        function resetForgotModalUI() {
          if (forgotEmailInput)  forgotEmailInput.value  = "";
          if (forgotOtpInput)    forgotOtpInput.value    = "";
          if (forgotNewPasswordInput)     forgotNewPasswordInput.value     = "";
          if (forgotConfirmPasswordInput) forgotConfirmPasswordInput.value = "";

          if (stepEmail)    stepEmail.style.display    = "block";
          if (stepOtp)      stepOtp.style.display      = "none";
          if (stepPassword) stepPassword.style.display = "none";
        }

        // Allow only digits for OTP, max 5 chars
        if (forgotOtpInput) {
          forgotOtpInput.addEventListener("input", function () {
            this.value = this.value.replace(/\D/g, "").slice(0, 5);
          });
        }

        // STEP 1: Send OTP (asks only email)
        if (forgotSendOtpBtn) {
          forgotSendOtpBtn.addEventListener("click", async function () {
            const email = (forgotEmailInput?.value || "").trim();

            if (!email) {
              alert("Please enter your email to receive OTP.");
              return;
            }

            const params = new URLSearchParams();
            params.append("email", email);

            try {
              const response = await fetch("/forgot-password", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const text = await response.text();
              let data = null;
              try { data = JSON.parse(text); } catch {}

              if (!response.ok) {
                alert((data && data.detail) || text || "Failed to send OTP");
                return;
              }

              // Pop-up info
              alert("A 5-digit OTP has been sent to your email.");

              // Move to STEP 2 – show OTP section
              if (stepOtp)   stepOtp.style.display = "block";
              if (stepEmail) stepEmail.style.display = "block"; // keep email visible but user can edit if needed
              if (forgotOtpInput) forgotOtpInput.focus();

            } catch (err) {
              alert("Network error: " + err.message);
            }
          });
        }

        // STEP 2: Verify OTP (front-end step; real check happens on reset)
        if (forgotVerifyOtpBtn) {
          forgotVerifyOtpBtn.addEventListener("click", function () {
            const otp = (forgotOtpInput?.value || "").trim();

            if (!otp) {
              alert("Please enter the OTP you received.");
              return;
            }
            if (otp.length !== 5 || !/^\d{5}$/.test(otp)) {
              alert("Please enter the 5-digit numeric OTP.");
              return;
            }

            // OTP "verified" for UI; real validation occurs on /reset-password
            alert("OTP verified. Please set your new password.");

            // Show STEP 3 – password fields
            if (stepPassword) stepPassword.style.display = "block";
            if (forgotNewPasswordInput) forgotNewPasswordInput.focus();
          });
        }

        // STEP 3: Reset Password (calls backend, validates OTP + new password)
        if (forgotResetBtn) {
          forgotResetBtn.addEventListener("click", async function () {
            const email   = (forgotEmailInput?.value || "").trim();
            const otp     = (forgotOtpInput?.value || "").trim();
            const newPass = (forgotNewPasswordInput?.value || "");
            const confirm = (forgotConfirmPasswordInput?.value || "");

            if (!email || !otp || !newPass || !confirm) {
              alert("Please fill Email, OTP, New Password and Confirm Password.");
              return;
            }

            if (otp.length !== 5 || !/^\d{5}$/.test(otp)) {
              alert("Please enter the 5-digit numeric OTP.");
              return;
            }

            const params = new URLSearchParams();
            params.append("email", email);
            params.append("otp", otp);
            params.append("new_password", newPass);
            params.append("confirm_password", confirm);

            try {
              const response = await fetch("/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
              });

              const text = await response.text();
              let data = null;
              try { data = JSON.parse(text); } catch {}

              if (!response.ok) {
                alert((data && data.detail) || text || "Failed to reset password");
                return;
              }

              alert("Your password has been reset successfully. Please log in with your new password.");
              if (forgotOverlay) forgotOverlay.classList.remove("show");
              resetForgotModalUI();
            } catch (err) {
              alert("Network error: " + err.message);
            }
          });
        }
      });

      // ========== GOOGLE SSO CALLBACK ==========
      async function handleGoogleCredentialResponse(response) {
        try {
          const id_token = response.credential;

          const res = await fetch("/auth/google", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ id_token: id_token })
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            alert("Google login failed: " + (err.detail || res.statusText));
            return;
          }

          const data = await res.json();

          if (data.access_token) {
            localStorage.setItem("access_token", data.access_token);
          }

          alert("Logged in with Google: " + (data.email || "User"));
          window.location.href = "/frontend/dashboard.html";
        } catch (e) {
          console.error(e);
          alert("Error during Google login");
        }
      }

      window.handleGoogleCredentialResponse = handleGoogleCredentialResponse;
    </script>

      paper.install(window);
      paper.setup(document.getElementById("canvas"));

      var canvasWidth, canvasHeight, canvasMiddleX, canvasMiddleY;
      var shapeGroup = new Group();
      var positionArray = [];

      function getCanvasBounds() {
        canvasWidth = view.size.width;
        canvasHeight = view.size.height;
        canvasMiddleX = canvasWidth / 2;
        canvasMiddleY = canvasHeight / 2;

        var p1 = { x: (canvasMiddleX / 2) + 100, y: 100 };
        var p2 = { x: 200, y: canvasMiddleY };
        var p3 = { x: (canvasMiddleX - 50) + (canvasMiddleX / 2), y: 150 };
        var p4 = { x: 0, y: canvasMiddleY + 100 };
        var p5 = { x: canvasWidth - 130, y: canvasHeight - 75 };
        var p6 = { x: canvasMiddleX + 80, y: canvasHeight - 50 };
        var p7 = { x: canvasWidth + 60, y: canvasMiddleY - 50 };
        var p8 = { x: canvasMiddleX + 100, y: canvasMiddleY + 100 };

        positionArray = [p3, p2, p5, p4, p1, p6, p7, p8];
      }

      function initializeShapes() {
        getCanvasBounds();

        var paths = [
          'M231,352l445-156L600,0L452,54L331,3L0,48L231,352',
          'M0,0l64,219L29,343l535,30L478,37l-133,4L0,0z',
          'M0,65l16,138l96,107l270-2L470,0L337,4L0,65z',
          'M333,0L0,94l64,219L29,437l570-151l-196-42L333,0',
          'M331.9,3.6l-331,45l231,304l445-156l-76-196l-148,54L331.9,3.6z',
          'M389,352l92-113l195-43l0,0l0,0L445,48l-80,1L122.7,0L0,275.2L162,297L389,352',
          'M 50 100 L 300 150 L 550 50 L 750 300 L 500 250 L 300 450 L 50 100',
          'M 700 350 L 500 350 L 700 500 L 400 400 L 200 450 L 250 350 L 100 300 L 150 50 L 350 100 L 250 150 L 450 150 L 400 50 L 550 150 L 350 250 L 650 150 L 650 50 L 700 150 L 600 250 L 750 250 L 650 300 L 700 350 '
        ];

        for (var i = 0; i < paths.length; i++) {
          var headerShape = new Path({
            strokeColor: 'rgba(255, 255, 255, 0.5)',
            strokeWidth: 2,
            parent: shapeGroup
          });
          headerShape.pathData = paths[i];
          headerShape.scale(2);
          headerShape.position = positionArray[i];
        }
      }

      initializeShapes();

      view.onFrame = function (event) {
        if (event.count % 4 === 0) {
          for (var i = 0; i < shapeGroup.children.length; i++) {
            shapeGroup.children[i].rotate(i % 2 === 0 ? -0.1 : 0.1);
          }
        }
      };

      view.onResize = function () {
        getCanvasBounds();
        for (var i = 0; i < shapeGroup.children.length; i++) {
          shapeGroup.children[i].position = positionArray[i];
        }
      };
    </script>
