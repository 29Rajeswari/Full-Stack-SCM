<body>
  <div class="dashboard-container">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <img src="/static/logo.jpg" alt="Logo">
      </div>
      <nav class="nav-menu">
        <a href="/frontend/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/frontend/account.html"><i class="fa fa-user-circle"></i> My Account</a>
        <a href="/frontend/createshipments.html"><i class="fa fa-plus"></i> Create Shipment</a>
        <a href="/frontend/shipments.html" class="active"><i class="fa fa-box"></i> My Shipments</a>
        <a href="/frontend/live_streaming.html"><i class="fa fa-microchip"></i> Live Streaming</a>
        <a class="logout-btn" href="/frontend/logout.html"><i class="fa fa-sign-out-alt"></i> Log out</a>
      </nav>
    </header>

    <main class="content">
      <h2>My Shipments</h2>
      <p class="form-note"></p>
      <div class="shipments-table-wrap">
        <div style="overflow:auto;">
          <table class="shipments-table" id="shipments-table">
            <thead>
              <tr>
                <th>Shipment #</th>
                <th>Container #</th>
                <th>Goods Type</th>
                <th>Route From</th>
                <th>Route To</th>
                <th>Device</th>
                <th>PO #</th>
                <th>NDC #</th>
                <th>Serial Goods</th>
                <th>Expected Delivery</th>
                <th>Delivery #</th>
                <th>Batch ID</th>
                <th>Description</th>
                <th>Created By</th>
              </tr>
            </thead>
            <tbody id="shipments-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
  (function () {
    const tbody = document.getElementById("shipments-tbody");

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // 👉 Build unique shipment id from user input + created_at timestamp
    function buildUniqueShipmentId(s) {
      const base = s.shipment_number || "";
      const created = s.created_at;
      if (!created) return base;

      // Convert UTC → IST (+5:30)
      const d = new Date(new Date(created).getTime() + (5.5 * 60 * 60 * 1000));

      const yyyy = d.getFullYear();
      const mm   = String(d.getMonth() + 1).padStart(2, "0");
      const dd   = String(d.getDate()).padStart(2, "0");
      const hh   = String(d.getHours()).padStart(2, "0");
      const mi   = String(d.getMinutes()).padStart(2, "0");
      const ss   = String(d.getSeconds()).padStart(2, "0");

      const stamp = `${yyyy}${mm}${dd}${hh}${mi}${ss}`;
      return `${base}-${stamp}`;
    }

    // 👉 Format created by info
    function formatCreatedBy(s) {
      const username = s.created_by || "unknown";
      const role = s.created_by_role || "user";
      const cssClass = role === "admin" ? "created-by-admin" : "created-by-user";
      return `<span class="${cssClass}">${escapeHtml(username)}</span>`;
    }

    function addRow(s) {
      const tr = document.createElement("tr");
      const uniqueId = buildUniqueShipmentId(s);
      const createdBy = formatCreatedBy(s);

      tr.innerHTML = `
        <td><span class="ship-id-badge">${escapeHtml(uniqueId)}</span></td>
        <td>${escapeHtml(s.container_number)}</td>
        <td>${escapeHtml(s.goods_type)}</td>
        <td>${escapeHtml(s.route_from)}</td>
        <td>${escapeHtml(s.route_to)}</td>
        <td>${escapeHtml(s.device)}</td>
        <td>${escapeHtml(s.po_number)}</td>
        <td>${escapeHtml(s.ndc_number)}</td>
        <td>${escapeHtml(s.serial_goods)}</td>
        <td>${escapeHtml(s.expected_delivery_date)}</td>
        <td>${escapeHtml(s.delivery_number)}</td>
        <td>${escapeHtml(s.batch_id)}</td>
        <td>${escapeHtml(s.description)}</td>
        <td>${createdBy}</td>
      `;
      tbody.appendChild(tr);
    }

    // Check authentication and load shipments
    const token = localStorage.getItem("access_token");
    if (!token) {
      alert("Please login to view shipments.");
      window.location.href = "/frontend/users.html";
    } else {
      // Load shipments with authentication
      fetch("/api/shipments?limit=100", {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      })
        .then(res => {
          if (res.status === 401) {
            localStorage.removeItem("access_token");
            alert("Session expired. Please login again.");
            window.location.href = "/frontend/users.html";
            return [];
          }
          return res.json();
        })
        .then(data => {
          if (Array.isArray(data)) data.forEach(addRow);
          else if (data) console.error("Unexpected response:", data);
        })
        .catch(err => console.error("Error loading shipments:", err));
    }

    // ⭐ Existing controls code kept as-is
    const note = document.querySelector('.form-note');
    if (note) {
      const controls = document.createElement('div');
      controls.className = 'shipments-controls';

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Enter Shipment #';
      input.className = 'shipment-input';

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'get-shipment-btn';
      btn.textContent = 'GET SHIPMENT DATA';

      controls.appendChild(input);
      controls.appendChild(btn);
      note.insertAdjacentElement('afterend', controls);

      btn.addEventListener('click', () => {
        const value = input.value.trim();
        const rows = tbody.querySelectorAll('tr');

        rows.forEach(r => r.classList.remove('highlight-row'));
        if (!value) return;

        rows.forEach(row => {
          const firstCell = row.querySelector('td');
          if (firstCell && firstCell.textContent.trim() === value) {
            row.classList.add('highlight-row');
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        });
      });
    }
  })();
</script>
