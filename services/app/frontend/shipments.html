<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Prevent back/forward navigation -->
  <script>
    (function() {
      for (var i = 0; i < 5; i++) {
        history.pushState(null, null, location.href);
      }
      window.addEventListener('popstate', function(e) {
        history.pushState(null, null, location.href);

  <style>
    /* --- ORIGINAL BASE STYLES (UNCHANGED) --- */
    body {
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      margin: 0;
      min-height: 60vh;
      background-color: #e7e6e6;
      background-image: url('/static/OIP(10).jpg');

      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 0 20px 0;
    }

    .dashboard-container {
      background: #f7eaff;
      backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(151, 47, 182, 0.5);

      padding: 20px 25px;
      color: #2c1040;
      margin-top: 4px;
      box-sizing: border-box;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      background: rgba(9, 13, 32, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(143, 148, 251, 0.3);
      z-index: 1000;
      margin-bottom: 0 !important;
    }

    .brand img {
      height: 50px;
      border-radius: 5px;
      box-shadow: 0 4px 12px rgba(185, 231, 232, 0.2);
    }

    .nav-menu {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .nav-menu a,
    .logout-btn {
      color: #030006;
      font-weight: 700;
      text-decoration: none;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background-color 0.3s ease, color 0.3s ease;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 12px #9974d8;
    }

    .nav-menu a:hover,
    .logout-btn:hover {
      background: linear-gradient(90deg, #a327ae, #36b1f4);
      color: #fff;
      box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
      transform: translateY(-2px);
    }

    .nav-menu a.active {
      background: linear-gradient(90deg, #b47bff, #5e43f3);
      color: #fff;
      box-shadow: 0 6px 18px rgba(88, 55, 170, 0.35);
    }

    .content h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1f0535;
      margin-bottom: px;
      text-shadow: 0 2px 3px rgba(238, 231, 231, 0.5);
    }

    .form-note {
      font-size: 0.95rem;
      color: #442864;
      margin-bottom: 15px;
      font-weight: 500;
    }

    .shipments-table-wrap {
      margin-top: 15px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 15px;
      padding: 10px;
      box-shadow: 0 6px 30px rgba(123, 146, 201, 0.2);
      overflow: hidden;
    }

    table.shipments-table {
      width: 100%;
      border-radius: 15px;
      border-collapse: collapse;
      font-family: "Roboto", Arial, sans-serif;
      min-width: 900px;
    }

    table.shipments-table thead th {
      position: sticky;
      top: 0;
      z-index: 4;
      padding: 10px 8px;
      text-align: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: #ffffff;
      background: linear-gradient(135deg, #5e35b1 0%, #7c4dff 50%, #b388ff 100%);
      border-bottom: 0;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      letter-spacing: 0.5px;
    }

    table.shipments-table thead th:first-child { border-top-left-radius: 8px; }
    table.shipments-table thead th:last-child  { border-top-right-radius: 8px; }

    table.shipments-table tbody tr:nth-child(odd)  { background: #f1e9ff; }
    table.shipments-table tbody tr:nth-child(even) { background: #e2dbff; }

    table.shipments-table td {
      padding: 10px 8px;
      border-bottom: 1px solid #e0d0ff;
      color: #1b1035;
      font-size: 0.8rem;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }

    /* First column styling for better visibility */
    table.shipments-table td:first-child {
      color: #6b4dff;
      font-weight: 700;
      text-shadow: 0 0 6px rgba(107, 77, 255, 0.3);
    }

    table.shipments-table tbody tr:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(123, 146, 201, 0.25);
      background: linear-gradient(180deg, #ffffff, #f9f4ff);
    }

    .ship-id-badge {
      display:inline-block;
      background: rgba(90, 43, 207, 0.1);
      color: #3b1a74;
      padding: 3px 6px;
      border-radius: 999px;
      font-weight:600;
      font-size:0.8rem;
    }

    .created-by-admin {
      display: inline-block;
      background: rgba(255, 152, 0, 0.2);
      color: #ff9800;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.75rem;
    }

    .created-by-user {
      display: inline-block;
      background: rgba(100, 181, 246, 0.2);
      color: #64b5f6;
      padding: 3px 8px;
      border-radius: 999px;

      font-size: 0.75rem;
    }

    @media (max-width: 900px) {
      .shipments-table-wrap { padding: 8px; }
      table.shipments-table { min-width: 700px; }
      .dashboard-container { padding: 20px 12px; }
    }

    /* ============================================================
       🔥 NEON + NAVBAR OVERRIDES TO MATCH CREATE SHIPMENT PAGE 🔥
       ============================================================ */

    /* Neon gradient background */

      background: radial-gradient(circle at top left, #00eaff33, #001a33 40%),
                  radial-gradient(circle at bottom right, #ff00d433, #000814 60%),
                  #000814 !important;
    color: #ffffff;
      padding: 10px 0 !important;   /* bring card closer to top */

    /* Dark glass main container */
    .dashboard-container {

    .content h2 {

    }

    /* 🔵 TEXT LOGO LIKE OTHER PAGES (SCMXpertLite) 🔵 */
    .brand {

    /* Keep HTML <img>, just hide it visually */

    .topbar .nav-menu a:hover,

    .topbar .logout-btn {

    .topbar .logout-btn:hover {
      background: linear-gradient(135deg, #e04b59, #d42a3a) !important;
      box-shadow: 0 14px 34px rgba(220, 53, 69, 0.6) !important;
    }

    /* 🌙 Dark-glass style table to match theme */
    .shipments-table-wrap {
      background: rgba(15, 20, 50, 0.9) !important;
      border-radius: 20px !important;
      border: 1px solid rgba(127, 93, 255, 0.35);
      box-shadow: 0 18px 40px rgba(20, 15, 60, 0.7);
    }

    table.shipments-table thead th {
      color: #f7f3ff !important;

    }

    table.shipments-table tbody tr:nth-child(odd) {
      background: rgba(255, 255, 255, 0.03) !important;
    }

    table.shipments-table tbody tr:nth-child(even) {
      background: rgba(255, 255, 255, 0.06) !important;
    }

    table.shipments-table td {
      border-bottom: 1px solid rgba(127, 93, 255, 0.3) !important;

    }

    table.shipments-table tbody tr:hover {
      background: rgba(138, 92, 255, 0.25) !important;

    }

    .ship-id-badge {
      background: rgba(164, 113, 255, 0.25) !important;
      color: #ffffff !important;
    }

    /* ============================================
       ⭐ NEW: LIVE-STREAM-LIKE SEARCH + BUTTON  ⭐
       (created via JS, HTML untouched)
       ============================================ */

    .shipments-controls {
      margin-top: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .shipment-input {
      width: 260px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #1e1e2b;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-size: 15px;
    }

    .get-shipment-btn {
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #6b4dff, #b06bff);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 5px 10px rgba(120, 80, 255, 0.4);
      transition: 0.2s ease-in-out;
    }

    .get-shipment-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 7px 18px rgba(150, 90, 255, 0.5);
    }

    .highlight-row {
      outline: 2px solid #ff6bff;
      box-shadow: 0 0 15px rgba(255, 107, 255, 0.7) inset;
    }

    /* Edit & Delete action buttons */
    .action-btn {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin: 0 3px;
      border: none;
      transition: all 0.2s;
      display: inline-block;
      white-space: nowrap;
    }

    .edit-btn {
      background: linear-gradient(135deg, #4caf50, #45a049);
      color: white;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }

    .edit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(76, 175, 80, 0.5);
    }

    .delete-btn {
      background: linear-gradient(135deg, #f44336, #e53935);
      color: white;
      box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
    }

    .delete-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(244, 67, 54, 0.5);
    }

    .view-btn {
      background: linear-gradient(135deg, #2196f3, #1976d2);
      color: white;
      box-shadow: 0 4px 12px rgba(33, 150, 243, 0.3);
    }

    .view-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(33, 150, 243, 0.5);
    }

    /* Edit Modal Styles */
    .edit-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.7);
    }

    .edit-modal-content {
      background: linear-gradient(135deg, #1e1e2b, #2d2d44);
      margin: 3% auto;
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(127, 93, 255, 0.4);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      max-width: 900px;
      width: 90%;
      color: #ffffff;
    }

    .edit-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(127, 93, 255, 0.3);
    }

    .edit-modal-header h3 {
      font-size: 24px;
      color: #f5e7ff;
      margin: 0;
    }

    .close-modal {
      color: #ffffff;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      line-height: 1;
    }

    .close-modal:hover {
      color: #ff6bff;
    }

    .edit-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .edit-form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .edit-form-group label {
      font-weight: 600;
      color: #c9b8ff;
      font-size: 13px;
    }

    .edit-form-group input,
    .edit-form-group textarea {
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(127, 93, 255, 0.3);
      color: #ffffff;
      font-size: 14px;
    }

    .edit-form-group input:focus,
    .edit-form-group textarea:focus {
      outline: none;
      border-color: #7f5dff;
      box-shadow: 0 0 10px rgba(127, 93, 255, 0.3);
    }

    .edit-form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(127, 93, 255, 0.3);
    }

    .save-btn, .cancel-btn {
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .save-btn {
      background: linear-gradient(135deg, #4caf50, #45a049);
      color: white;
      box-shadow: 0 6px 16px rgba(76, 175, 80, 0.4);
    }

    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
    }

    .cancel-btn {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .cancel-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* View Modal Styles */
    .view-modal {
      display: none;
      position: fixed;
      z-index: 1001;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.7);
    }

    .view-modal-content {
      background: linear-gradient(135deg, #1e1e2b, #2d2d44);
      margin: 3% auto;
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(127, 93, 255, 0.4);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      max-width: 800px;
      width: 90%;
      color: #ffffff;
    }

    .view-modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(127, 93, 255, 0.3);
    }

    .view-modal-header h3 {

      margin: 0;
    }

      color: #ffffff;

    .shipment-details-grid {

    .detail-item {

    }

    .detail-item:hover {

      grid-column: 1 / -1;

    .detail-label {
      font-size: 12px;

    }

    .view-footer-btn {

      border-radius: 30px;
      font-size: 15px;

      cursor: pointer;
      border: none;

<body>
  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <img src="/static/logo.jpg" alt="Logo">
    </div>
    <nav class="nav-menu">
      <a href="/frontend/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
      <a href="/frontend/account.html"><i class="fa fa-user-circle"></i> My Account</a>
      <a href="/frontend/createshipments.html"><i class="fa fa-plus"></i> Create Shipment</a>
      <a href="/frontend/shipments.html" class="active"><i class="fa fa-box"></i> My Shipments</a>
      <a href="/frontend/live_streaming.html" id="nav-live-streaming"><i class="fa fa-microchip"></i> Live Streaming</a>
      <a href="/frontend/manage_users.html" id="nav-manage-users"><i class="fa fa-users"></i> Manage Users</a>
      <a class="logout-btn" href="/frontend/logout.html"><i class="fa fa-sign-out-alt"></i> Log out</a>
    </nav>
  </header>

  <div class="dashboard-container">
    <main class="content">
      <h2>My Shipments</h2>
      <p class="form-note"></p>
      <div class="shipments-table-wrap">
        <div style="overflow:auto;">
          <table class="shipments-table" id="shipments-table">
            <thead>
              <tr>
                <th>Shipment #</th>
                <th>Device</th>
                <th>Route From</th>
                <th>Route To</th>
                <th>NDC #</th>
                <th>Goods Type</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="shipments-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- View Shipment Modal -->
  <div id="view-modal" class="view-modal">
    <div class="view-modal-content">
      <div class="view-modal-header">
        <h3><i class="fa fa-eye"></i> Shipment Details</h3>
        <span class="view-close-modal">&times;</span>
      </div>
      <div class="view-modal-body">
        <div class="shipment-details-grid" id="shipment-details-grid">
          <!-- Details will be populated dynamically -->
        </div>
      </div>
      <div class="view-modal-footer">
        <button type="button" class="view-footer-btn view-close-btn">Close</button>
      </div>
    </div>
  </div>

  <!-- Edit Shipment Modal -->
  <div id="edit-modal" class="edit-modal">
    <div class="edit-modal-content">
      <div class="edit-modal-header">
        <h3>Edit Shipment</h3>
        <span class="close-modal">&times;</span>
      </div>
      
      <form id="edit-shipment-form">
        <input type="hidden" id="edit-shipment-id">
        
        <div class="edit-form-grid">
          <div class="edit-form-group">
            <label for="edit-shipment-number">Shipment Number *</label>
            <input type="text" id="edit-shipment-number" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-container-number">Container Number *</label>
            <input type="text" id="edit-container-number" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-goods-type">Goods Type *</label>
            <input type="text" id="edit-goods-type" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-route-from">Route From *</label>
            <input type="text" id="edit-route-from" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-route-to">Route To *</label>
            <input type="text" id="edit-route-to" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-device">Device *</label>
            <input type="text" id="edit-device" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-po-number">PO Number *</label>
            <input type="text" id="edit-po-number" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-ndc-number">NDC Number *</label>
            <input type="text" id="edit-ndc-number" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-serial-goods">Serial Goods *</label>
            <input type="text" id="edit-serial-goods" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-expected-delivery-date">Expected Delivery Date *</label>
            <input type="text" id="edit-expected-delivery-date" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-delivery-number">Delivery Number *</label>
            <input type="text" id="edit-delivery-number" required>
          </div>
          
          <div class="edit-form-group">
            <label for="edit-batch-id">Batch ID *</label>
            <input type="text" id="edit-batch-id" required>
          </div>
          
          <div class="edit-form-group" style="grid-column: 1 / -1;">
            <label for="edit-description">Description *</label>
            <textarea id="edit-description" rows="3" required></textarea>
          </div>
        </div>
        
        <div class="edit-form-actions">
          <button type="button" class="cancel-btn">Cancel</button>
          <button type="submit" class="save-btn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
  (function () {
    const tbody = document.getElementById("shipments-tbody");

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    // 👉 Build unique shipment id from user input + created_at timestamp
    function buildUniqueShipmentId(s) {
      const base = s.shipment_number || "";
      const created = s.created_at;
      if (!created) return base;

      // Convert UTC → IST (+5:30)
      const d = new Date(new Date(created).getTime() + (5.5 * 60 * 60 * 1000));

      const yyyy = d.getFullYear();
      const mm   = String(d.getMonth() + 1).padStart(2, "0");
      const dd   = String(d.getDate()).padStart(2, "0");
      const hh   = String(d.getHours()).padStart(2, "0");
      const mi   = String(d.getMinutes()).padStart(2, "0");
      const ss   = String(d.getSeconds()).padStart(2, "0");

      const stamp = `${yyyy}${mm}${dd}${hh}${mi}${ss}`;
      return `${base}-${stamp}`;
    }

    // 👉 Format created by info
    function formatCreatedBy(s) {
      const username = s.created_by || "unknown";
      const role = s.created_by_role || "user";
      const cssClass = role === "admin" ? "created-by-admin" : "created-by-user";
      return `<span class="${cssClass}">${escapeHtml(username)}</span>`;
    }

    function addRow(s) {
      const tr = document.createElement("tr");
      const uniqueId = buildUniqueShipmentId(s);
      const createdBy = formatCreatedBy(s);

      tr.innerHTML = `
        <td><span class="ship-id-badge">${escapeHtml(uniqueId)}</span></td>
        <td>${escapeHtml(s.device)}</td>
        <td>${escapeHtml(s.route_from)}</td>
        <td>${escapeHtml(s.route_to)}</td>
        <td>${escapeHtml(s.ndc_number)}</td>
        <td>${escapeHtml(s.goods_type)}</td>
        <td>
          <button class="action-btn view-btn" data-id="${escapeHtml(s.id)}">View</button>
          <button class="action-btn edit-btn" data-id="${escapeHtml(s.id)}">Edit</button>
          <button class="action-btn delete-btn" data-id="${escapeHtml(s.id)}">Delete</button>
        </td>
      `;
      tbody.appendChild(tr);
    }

    // Check authentication and load shipments
    const token = localStorage.getItem("access_token");
    if (!token) {
      alert("Please login to view shipments.");
      window.location.href = "/frontend/users.html";
    } else {
      // Load shipments with authentication
      fetch("/api/shipments?limit=100", {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      })
        .then(res => {
          if (res.status === 401) {
            localStorage.removeItem("access_token");
            alert("Session expired. Please login again.");
            window.location.href = "/frontend/users.html";
            return [];
          }
          return res.json();
        })
        .then(data => {
          if (Array.isArray(data)) data.forEach(addRow);
          else if (data) console.error("Unexpected response:", data);
        })
        .catch(err => console.error("Error loading shipments:", err));
    }

    // ⭐ Existing controls code kept as-is
    const note = document.querySelector('.form-note');
    if (note) {
      const controls = document.createElement('div');
      controls.className = 'shipments-controls';

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = 'Enter Shipment #';
      input.className = 'shipment-input';

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'get-shipment-btn';
      btn.textContent = 'GET SHIPMENT DATA';

      controls.appendChild(input);
      controls.appendChild(btn);
      note.insertAdjacentElement('afterend', controls);

      btn.addEventListener('click', () => {
        const value = input.value.trim();
        const rows = tbody.querySelectorAll('tr');

        rows.forEach(r => r.classList.remove('highlight-row'));
        if (!value) return;

        rows.forEach(row => {
          const firstCell = row.querySelector('td');
          if (firstCell && firstCell.textContent.trim() === value) {
            row.classList.add('highlight-row');
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        });
      });
    }

    // ========== EDIT & DELETE FUNCTIONALITY ==========
    
    const modal = document.getElementById('edit-modal');
    const closeBtn = modal.querySelector('.close-modal');
    const cancelBtn = modal.querySelector('.cancel-btn');
    const editForm = document.getElementById('edit-shipment-form');
    
    // Close modal
    function closeModal() {
      modal.style.display = 'none';
    }
    
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    
    window.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });
    
    // Open edit modal and populate form
    tbody.addEventListener('click', (e) => {
      if (e.target.classList.contains('view-btn')) {
        const shipmentId = e.target.getAttribute('data-id');
        viewShipmentDetails(shipmentId);
      }
      
      if (e.target.classList.contains('edit-btn')) {
        const shipmentId = e.target.getAttribute('data-id');
        openEditModal(shipmentId);
      }
      
      if (e.target.classList.contains('delete-btn')) {
        const shipmentId = e.target.getAttribute('data-id');
        deleteShipment(shipmentId);
      }
    });
    
    // Fetch shipment data for editing
    async function openEditModal(shipmentId) {
      try {
        const response = await fetch(`/api/shipments?limit=500`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        if (!response.ok) {
          throw new Error('Failed to load shipments');
        }
        
        const shipments = await response.json();
        const shipment = shipments.find(s => s.id === shipmentId);
        
        if (!shipment) {
          alert('Shipment not found');
          return;
        }
        
        // Populate form fields
        document.getElementById('edit-shipment-id').value = shipment.id;
        document.getElementById('edit-shipment-number').value = shipment.shipment_number;
        document.getElementById('edit-container-number').value = shipment.container_number;
        document.getElementById('edit-goods-type').value = shipment.goods_type;
        document.getElementById('edit-route-from').value = shipment.route_from;
        document.getElementById('edit-route-to').value = shipment.route_to;
        document.getElementById('edit-device').value = shipment.device;
        document.getElementById('edit-po-number').value = shipment.po_number;
        document.getElementById('edit-ndc-number').value = shipment.ndc_number;
        document.getElementById('edit-serial-goods').value = shipment.serial_goods;
        document.getElementById('edit-expected-delivery-date').value = shipment.expected_delivery_date;
        document.getElementById('edit-delivery-number').value = shipment.delivery_number;
        document.getElementById('edit-batch-id').value = shipment.batch_id;
        document.getElementById('edit-description').value = shipment.description;
        
        modal.style.display = 'block';
      } catch (error) {
        console.error('Error loading shipment:', error);
        alert('Failed to load shipment data');
      }
    }
    
    // View shipment details
    function viewShipmentDetails(shipmentId) {
      fetch(`/api/shipments?limit=500`, {
        headers: {
          'Authorization': `Bearer ${token}`
        }
      })
      .then(res => res.json())
      .then(shipments => {
        const shipment = shipments.find(s => s.id === shipmentId);
        if (shipment) {
          const detailsGrid = document.getElementById('shipment-details-grid');
          detailsGrid.innerHTML = `
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-hashtag"></i> Shipment Number</div>
              <div class="detail-value badge">${escapeHtml(shipment.shipment_number)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-barcode"></i> Container Number</div>
              <div class="detail-value">${escapeHtml(shipment.container_number)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-box"></i> Goods Type</div>
              <div class="detail-value">${escapeHtml(shipment.goods_type)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-map-marker-alt"></i> Route From</div>
              <div class="detail-value">${escapeHtml(shipment.route_from)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-flag-checkered"></i> Route To</div>
              <div class="detail-value">${escapeHtml(shipment.route_to)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-microchip"></i> Device</div>
              <div class="detail-value">${escapeHtml(shipment.device)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-file-invoice"></i> PO Number</div>
              <div class="detail-value">${escapeHtml(shipment.po_number)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-pills"></i> NDC Number</div>
              <div class="detail-value">${escapeHtml(shipment.ndc_number)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-list-ol"></i> Serial Goods</div>
              <div class="detail-value">${escapeHtml(shipment.serial_goods)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-calendar-alt"></i> Expected Delivery</div>
              <div class="detail-value">${escapeHtml(shipment.expected_delivery_date)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-truck"></i> Delivery Number</div>
              <div class="detail-value">${escapeHtml(shipment.delivery_number)}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-cube"></i> Batch ID</div>
              <div class="detail-value">${escapeHtml(shipment.batch_id)}</div>
            </div>
            <div class="detail-item full-width">
              <div class="detail-label"><i class="fa fa-align-left"></i> Description</div>
              <div class="detail-value">${escapeHtml(shipment.description || 'N/A')}</div>
            </div>
            <div class="detail-item">
              <div class="detail-label"><i class="fa fa-user"></i> Created By</div>
              <div class="detail-value">${escapeHtml(shipment.created_by)}</div>
            </div>
          `;
          
          // Show the modal
          document.getElementById('view-modal').style.display = 'block';
        } else {
          alert('Shipment not found');
        }
      })
      .catch(err => {
        console.error('Error loading shipment:', err);
        alert('Failed to load shipment details');
      });
    }
    
    // View modal close functionality
    const viewModal = document.getElementById('view-modal');
    const viewCloseBtn = viewModal.querySelector('.view-close-modal');
    const viewFooterCloseBtn = viewModal.querySelector('.view-close-btn');
    
    function closeViewModal() {
      viewModal.style.display = 'none';
    }
    
    viewCloseBtn.addEventListener('click', closeViewModal);
    viewFooterCloseBtn.addEventListener('click', closeViewModal);
    
    viewModal.addEventListener('click', (e) => {
      if (e.target === viewModal) {
        closeViewModal();
      }
    });
    
    // Save edited shipment
    editForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const shipmentId = document.getElementById('edit-shipment-id').value;
      
      // Collect form data as JSON
      const formData = {
        shipment_number: document.getElementById('edit-shipment-number').value,
        route_to: document.getElementById('edit-route-to').value,
        route_from: document.getElementById('edit-route-from').value,
        device: document.getElementById('edit-device').value,
        po_number: document.getElementById('edit-po-number').value,
        ndc_number: document.getElementById('edit-ndc-number').value,
        serial_goods: document.getElementById('edit-serial-goods').value,
        container_number: document.getElementById('edit-container-number').value,
        goods_type: document.getElementById('edit-goods-type').value,
        expected_delivery_date: document.getElementById('edit-expected-delivery-date').value,
        delivery_number: document.getElementById('edit-delivery-number').value,
        batch_id: document.getElementById('edit-batch-id').value,
        description: document.getElementById('edit-description').value
      };
      
      try {
        const response = await fetch(`/api/shipments/update/${shipmentId}`, {
          method: 'PUT',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.detail || 'Failed to update shipment');
        }
        
        alert('Shipment updated successfully!');
        closeModal();
        
        // Reload shipments table
        location.reload();
      } catch (error) {
        console.error('Error updating shipment:', error);
        alert('Error: ' + error.message);
      }
    });
    
    // Delete shipment
    async function deleteShipment(shipmentId) {
      if (!confirm('Are you sure you want to delete this shipment? This action cannot be undone.')) {
        return;
      }
      
      try {
        const response = await fetch(`/api/shipments/delete/${shipmentId}`, {
          method: 'DELETE',
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        
        const result = await response.json();
        
        if (!response.ok) {
          throw new Error(result.detail || 'Failed to delete shipment');
        }
        
        alert('Shipment deleted successfully!');
        
        // Reload shipments table
        location.reload();
      } catch (error) {
        console.error('Error deleting shipment:', error);
        alert('Error: ' + error.message);
      }
    }
  })();
  
  // Role-based navigation visibility
  window.addEventListener('load', function() {
    const userRole = localStorage.getItem("user_role") || "user";
    const liveStreamingNav = document.getElementById("nav-live-streaming");
    const manageUsersNav = document.getElementById("nav-manage-users");
    
    if (userRole === "admin") {
      // Admin: Show all navigation items
      if (liveStreamingNav) liveStreamingNav.style.display = "flex";
      if (manageUsersNav) manageUsersNav.style.display = "flex";
    } else {
      // Regular user: Hide Live Streaming and Manage Users
      if (liveStreamingNav) liveStreamingNav.style.display = "none";
      if (manageUsersNav) manageUsersNav.style.display = "none";
    }
  });
</script>
