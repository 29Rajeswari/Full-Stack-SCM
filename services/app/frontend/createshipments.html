  <!-- Prevent back/forward navigation -->
  <script>
    // Aggressive prevention - runs before anything else
    (function() {
      // Push multiple states to prevent back navigation
      for (var i = 0; i < 5; i++) {
        history.pushState(null, null, location.href);
      }
      
      // Handle popstate (back/forward clicks)
      window.addEventListener('popstate', function(e) {
        // Push state again immediately
        history.pushState(null, null, location.href);
      });
      
      // Handle pageshow (browser cache restoration)
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
          for (var i = 0; i < 5; i++) {
            history.pushState(null, null, location.href);
          }
        }
      });
    })();
  </script>

<body>
  <div class="dashboard-container">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <img src="/static/logo.jpg" alt="Logo">
      </div>
      <nav class="nav-menu">
        <a href="/frontend/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
        <a href="/frontend/account.html"><i class="fa fa-user-circle"></i> My Account</a>
        <a href="/frontend/createshipments.html" class="active"><i class="fa fa-plus"></i> Create Shipment</a>
        <a href="/frontend/shipments.html"><i class="fa fa-box"></i> My Shipments</a>
        <a href="/frontend/live_streaming.html"><i class="fa fa-microchip"></i> Live Streaming</a>
        <a class="logout-btn" href="/frontend/logout.html"><i class="fa fa-sign-out-alt"></i> Log out</a>
      </nav>
    </header>

    <main class="content">
      <h2>Create New Shipment</h2>
      <p class="form-note">Please fill all the details.</p>

      <form id="shipment-form" class="shipment-form">
        <div class="form-grid">
          <!-- Column 1 -->
          <div class="form-column">
            <label><i class="fa fa-barcode"></i> Shipment Number*</label>
            <input type="text" name="shipment_number" required />

            <label><i class="fa fa-route"></i> To Route Details*</label>
            <input type="text" name="route_to" placeholder="e.g., Chennai" required />

            <label><i class="fa fa-route"></i> From Route Details*</label>
            <input type="text" name="route_from" placeholder="e.g., Tirupati" required />

            <label><i class="fa fa-microchip"></i> Device*</label>
            <select name="device" required>
              <option value="">Select Device</option>
              <option>Device A</option>
              <option>Device B</option>
              <option>Device C</option>
            </select>

            <label><i class="fa fa-file-invoice"></i> PO Number*</label>
            <input type="text" name="po_number" required />

            <label><i class="fa fa-hashtag"></i> NDC Number*</label>
            <input type="text" name="ndc_number" required />

            <label><i class="fa fa-box-open"></i> Serial Number of Goods*</label>
            <input type="text" name="serial_goods" required />
          </div>

          <!-- Column 2 -->
          <div class="form-column">
            <label><i class="fa fa-box"></i> Container Number*</label>
            <input type="text" name="container_number" required />

            <label><i class="fa fa-tags"></i> Goods Type*</label>
            <select name="goods_type" required>
              <option value="">Select Goods</option>
              <option>Electronics</option>
              <option>Pharma</option>
              <option>Food</option>
            </select>

            <label><i class="fa fa-calendar-alt"></i> Expected Delivery Date*</label>
            <input type="date" name="expected_delivery_date" required />

            <label><i class="fa fa-truck"></i> Delivery Number*</label>
            <input type="text" name="delivery_number" required />

            <label><i class="fa fa-barcode"></i> Batch ID*</label>
            <input type="text" name="batch_id" required />

            <label><i class="fa fa-align-left"></i> Shipment Description*</label>
            <textarea name="description" required></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">
            <i class="fa fa-check"></i> CREATE SHIPMENT
          </button>
          <button type="reset" class="btn-danger">
            <i class="fa fa-eraser"></i> CLEAR DETAILS
          </button>
        </div>
      </form>

      <div id="result" class="result-message" style="display:none;"></div>
    </main>
  </div>

  <script>
  (function () {
    const form = document.getElementById("shipment-form");
    const resultBox = document.getElementById("result");
    const submitBtn = form.querySelector('button[type="submit"]');

    function showError(msg) {
      resultBox.style.display = "block";
      resultBox.className = "result-message result-error";
      resultBox.textContent = msg;
      // scroll to result so user sees it (if needed)
      resultBox.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function showSuccess(msg) {
      resultBox.style.display = "block";
      resultBox.className = "result-message result-success";
      resultBox.textContent = msg;
      resultBox.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function clearResult() {
      resultBox.style.display = "none";
      resultBox.textContent = "";
    }

    // Validation rules (regex)
    const patterns = {
      po: /^\d{6}$/,                       // exactly 6 digits
      ndc: /^\d{11}$/,                     // exactly 11 digits
      shipmentNumber: /^[A-Za-z0-9\-]{3,20}$/, // alphanumeric & dash, length 3-20
      container: /^[A-Za-z0-9\-]{4,20}$/,  // alphanumeric & dash, length 4-20
      deliveryNumber: /^\d{1,20}$/,       // numeric id up to 20 digits
      noCommaDot: /^[^,\.]+$/             // no comma or dot
    };

    function isDateInFutureOrToday(dateStr) {
      if (!dateStr) return false;
      const d = new Date(dateStr);
      if (isNaN(d)) return false;
      // Compare only date portion (ignore time zones)
      const today = new Date();
      today.setHours(0,0,0,0);
      d.setHours(0,0,0,0);
      return d >= today;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      clearResult();

      // grab and trim fields
      const fd = new FormData(form);
      const data = {};
      for (const [k, v] of fd.entries()) data[k] = (typeof v === "string") ? v.trim() : v;

      // required fields list
      const required = [
        "shipment_number",
        "route_to",
        "route_from",
        "device",
        "po_number",
        "ndc_number",
        "serial_goods",
        "container_number",
        "goods_type",
        "expected_delivery_date",
        "delivery_number",
        "batch_id",
        "description"
      ];

      for (const key of required) {
        if (!data[key] || data[key].length === 0) {
          showError(`Please fill the required field: ${key.replace(/_/g, ' ')}.`);
          return;
        }
      }

      // specific validations
      if (!patterns.shipmentNumber.test(data.shipment_number)) {
        showError("Shipment Number must be 3-20 characters: letters, numbers or '-' only.");
        return;
      }

      if (!patterns.po.test(data.po_number)) {
        showError("PO Number must be exactly 6 digits.");
        return;
      }

      if (!patterns.ndc.test(data.ndc_number)) {
        showError("NDC Number must be exactly 11 digits.");
        return;
      }

      if (!patterns.container.test(data.container_number)) {
        showError("Container Number must be 4-20 characters and contain only letters, numbers or '-'.");
        return;
      }

      if (!patterns.noCommaDot.test(data.batch_id)) {
        showError("Batch ID must not contain commas or dots.");
        return;
      }

      if (!patterns.noCommaDot.test(data.serial_goods)) {
        showError("Serial Number of Goods must not contain commas or dots.");
        return;
      }

      if (!patterns.deliveryNumber.test(data.delivery_number)) {
        showError("Delivery Number must be numeric (up to 20 digits).");
        return;
      }

      if (!isDateInFutureOrToday(data.expected_delivery_date)) {
        showError("Expected Delivery Date must be today or a future date.");
        return;
      }

      if (data.description.length < 10) {
        showError("Description must be at least 10 characters long.");
        return;
      }
      if (data.description.length > 500) {
        showError("Description cannot exceed 500 characters.");
        return;
      }

      // device/goods type selection checks
      if (!data.device || data.device === "") {
        showError("Please select a Device.");
        return;
      }
      if (!data.goods_type || data.goods_type === "") {
        showError("Please select Goods Type.");
        return;
      }

      // pass all validations -> submit
      try {
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.6";

        const payload = new URLSearchParams();
        for (const k in data) payload.append(k, data[k]);

        // Get auth token
        const token = localStorage.getItem("access_token");
        if (!token) {
          showError("Please login to create shipments.");
          window.location.href = "/frontend/users.html";
          return;
        }

        const response = await fetch("/api/shipments/create", {
          method: "POST",
          headers: { 
            "Content-Type": "application/x-www-form-urlencoded",
            "Authorization": `Bearer ${token}`
          },
          body: payload.toString(),
        });

        const text = await response.text();
        let json;
        try { json = JSON.parse(text); } catch { json = null; }

        if (response.status === 401) {
          showError("Session expired. Please login again.");
          localStorage.removeItem("access_token");
          setTimeout(() => { window.location.href = "/frontend/users.html"; }, 1500);
          return;
        }

        if (!response.ok) {
          showError(json?.detail || text || "Error creating shipment");
          submitBtn.disabled = false;
          submitBtn.style.opacity = "";
          return;
        }

        showSuccess(json?.message || "Shipment created successfully!");
        form.reset();
      } catch (err) {
        showError("Network error: " + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.style.opacity = "";
      }
    });
  })();

  // Check authentication on page load
  window.addEventListener("load", function() {
    const token = localStorage.getItem("access_token");
    if (!token) {
      alert("Please login to access this page.");
      window.location.href = "/frontend/users.html";
    }
  });
</script>
