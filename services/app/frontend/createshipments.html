<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Shipment — SCMXpertLite</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Prevent back/forward navigation -->
  <script>
    (function() {
      for (var i = 0; i < 5; i++) {
        history.pushState(null, null, location.href);
      }
      window.addEventListener('popstate', function(e) {
        history.pushState(null, null, location.href);
      });
      window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
          for (var i = 0; i < 5; i++) {
            history.pushState(null, null, location.href);
          }
        }
      });
    })();
  </script>

  <style>
    body {
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 100px 0 20px 0;
      background: radial-gradient(circle at top left, #00eaff33, #001a33 40%),
                  radial-gradient(circle at bottom right, #ff00d433, #000814 60%),
                  #000814 !important;
      color: #ffffff;
    }

    .dashboard-container {
      background: rgba(9, 13, 32, 0.9) !important;
      border-radius: 32px !important;
      border: 1px solid rgba(143, 148, 251, 0.3) !important;
      box-shadow: 0 22px 45px rgba(104, 74, 255, 0.25) !important;
      color: #ffffff !important;
      width: 98%;
      max-width: 1600px;
      padding: 30px 40px;
      box-sizing: border-box;
    }

    /* Fixed navbar at top */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 40px;
      background: rgba(9, 13, 32, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(143, 148, 251, 0.3);
      z-index: 1000;
      margin-bottom: 0 !important;
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand img {
      display: none !important;
    }

    .brand::before {
      content: "SCMXpertLite";
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #f6f4f7;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
    }

    .nav-menu {
      display: flex;
      gap: 12px !important;
      align-items: center;
      flex-wrap: nowrap !important;
      margin-left: 24px !important;
    }

    .topbar .nav-menu a,
    .topbar .logout-btn {
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      font-size: 12px !important;
      font-weight: 600 !important;
      padding: 8px 18px !important;
      border-radius: 999px !important;
      background: #ffffff !important;
      color: #1c1233 !important;
      box-shadow: 0 10px 24px rgba(138, 92, 255, 0.25) !important;
      white-space: nowrap !important;
      border: none !important;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
    }

    .topbar .nav-menu a.active {
      background: linear-gradient(135deg, #b06bff, #6b4dff) !important;
      color: #ffffff !important;
      box-shadow: 0 12px 30px rgba(120, 80, 255, 0.55) !important;
    }

    .topbar .nav-menu a:hover,
    .topbar .logout-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #b06bff, #6b4dff) !important;
      color: #ffffff !important;
      box-shadow: 0 14px 32px rgba(120, 80, 255, 0.7) !important;
    }

    .topbar .logout-btn {
      background: #ff5b5b !important;
      color: #ffffff !important;
      box-shadow: 0 10px 24px rgba(255, 91, 91, 0.45) !important;
      padding: 8px 20px !important;
    }

    .topbar .logout-btn:hover {
      background: #ff4242 !important;
      box-shadow: 0 14px 34px rgba(255, 66, 66, 0.7) !important;
    }

    /* Content */
    .content {
      padding: 10px 0;
    }

    .page-title {
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #f9f5ff !important;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 40px;
      color: #d0c8ff !important;
    }

    /* Form Styles */
    .shipment-form {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(15, 20, 50, 0.6);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid rgba(127, 93, 255, 0.3);
      backdrop-filter: blur(10px);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-label {
      margin-bottom: 8px;
      color: #a9b2ff;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input,
    .form-textarea {
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(10, 14, 38, 0.8);
      color: #ffffff;
      border: 1px solid rgba(145, 115, 255, 0.5);
      font-size: 14px;
      font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
      transition: all 0.3s ease;
    }

    .form-input::placeholder,
    .form-textarea::placeholder {
      color: #7b7b9a;
    }

    .form-input:focus,
    .form-textarea:focus {
      outline: none;
      border-color: #b987ff;
      box-shadow: 0 0 0 3px rgba(185, 135, 255, 0.3);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #6b4dff, #b06bff);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(107, 77, 255, 0.4);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 20px;
    }

    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(107, 77, 255, 0.6);
    }

    .submit-btn:active {
      transform: translateY(-1px);
    }

    /* Result Message */
    .result-message {
      margin-top: 20px;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .result-success {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
      border: 1px solid rgba(76, 175, 80, 0.4);
    }

    .result-error {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
      border: 1px solid rgba(244, 67, 54, 0.4);
    }

    @media (max-width: 900px) {
      .dashboard-container {
        width: 96%;
        padding: 20px;
      }
      .shipment-form {
        padding: 25px;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 15px 20px;
      }
      .nav-menu {
        flex-wrap: wrap !important;
        margin-left: 0 !important;
      }
    }
  </style>
</head>
<body>
  <!-- Top Navigation Bar -->
  <header class="topbar">
    <div class="brand">
      <img src="/static/logo.jpg" alt="Logo">
    </div>
    <nav class="nav-menu">
      <a href="/frontend/dashboard.html"><i class="fa fa-home"></i> Dashboard</a>
      <a href="/frontend/account.html"><i class="fa fa-user-circle"></i> My Account</a>
      <a href="/frontend/createshipments.html" class="active"><i class="fa fa-plus"></i> Create Shipment</a>
      <a href="/frontend/shipments.html"><i class="fa fa-box"></i> My Shipments</a>
      <a href="/frontend/live_streaming.html"><i class="fa fa-microchip"></i> Live Streaming</a>
      <a class="logout-btn" href="/frontend/logout.html"><i class="fa fa-sign-out-alt"></i> Log out</a>
    </nav>
  </header>

  <div class="dashboard-container">
    <main class="content">
      <h1 class="page-title">Create New Shipment</h1>
      <p class="subtitle">Fill in the details below to create a new shipment</p>

      <form id="shipmentForm" class="shipment-form">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Shipment Number *</label>
            <input type="text" class="form-input" name="shipment_number" required placeholder="Enter shipment number">
          </div>

          <div class="form-group">
            <label class="form-label">PO Number *</label>
            <input type="text" class="form-input" name="po_number" required placeholder="Enter PO number">
          </div>

          <div class="form-group">
            <label class="form-label">NDC Number *</label>
            <input type="text" class="form-input" name="ndc_number" required placeholder="Enter NDC number">
          </div>

          <div class="form-group">
            <label class="form-label">Serial Goods *</label>
            <input type="text" class="form-input" name="serial_goods" required placeholder="Enter serial number">
          </div>

          <div class="form-group">
            <label class="form-label">Container Number *</label>
            <input type="text" class="form-input" name="container_number" required placeholder="Enter container number">
          </div>

          <div class="form-group">
            <label class="form-label">Delivery Number *</label>
            <input type="text" class="form-input" name="delivery_number" required placeholder="Enter delivery number">
          </div>

          <div class="form-group">
            <label class="form-label">Batch ID *</label>
            <input type="text" class="form-input" name="batch_id" required placeholder="Enter batch ID">
          </div>

          <div class="form-group">
            <label class="form-label">Device *</label>
            <input type="text" class="form-input" name="device" required placeholder="Enter device ID">
          </div>

          <div class="form-group">
            <label class="form-label">Route From *</label>
            <input type="text" class="form-input" name="route_from" required placeholder="Origin location">
          </div>

          <div class="form-group">
            <label class="form-label">Route To *</label>
            <input type="text" class="form-input" name="route_to" required placeholder="Destination location">
          </div>

          <div class="form-group">
            <label class="form-label">Goods Type *</label>
            <input type="text" class="form-input" name="goods_type" required placeholder="Type of goods">
          </div>

          <div class="form-group">
            <label class="form-label">Expected Delivery Date *</label>
            <input type="date" class="form-input" name="expected_delivery_date" required>
          </div>

          <div class="form-group full-width">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" name="description" placeholder="Additional shipment details (optional)"></textarea>
          </div>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fa fa-plus-circle"></i> Create Shipment
        </button>

        <div id="resultBox" class="result-message"></div>
      </form>
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("shipmentForm");
      const resultBox = document.getElementById("resultBox");

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        resultBox.style.display = "none";

        const formData = new FormData(form);
        const payload = new URLSearchParams();

        for (const [key, value] of formData.entries()) {
          payload.append(key, value);
        }

        try {
          const response = await fetch("/api/shipments/create", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded",
            },
            body: payload.toString(),
          });

          const text = await response.text();
          let json;
          try { json = JSON.parse(text); } catch { json = null; }

          if (!response.ok) {
            resultBox.style.display = "block";
            resultBox.className = "result-message result-error";
            resultBox.textContent = json?.detail || text || "Error creating shipment";
            return;
          }

          resultBox.style.display = "block";
          resultBox.className = "result-message result-success";
          resultBox.textContent = json?.message || "Shipment created successfully!";
          form.reset();
        } catch (err) {
          resultBox.style.display = "block";
          resultBox.className = "result-message result-error";
          resultBox.textContent = "Network error: " + err.message;
        }
      });
    });
  </script>
</body>
</html>
